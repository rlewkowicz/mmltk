[global]
remove_todos = true
remove_fixme = true
remove_docs = true
use_default_ignores = false
respect_gitignore = true
traverse_git_repos = false
preserve_patterns = [
    "SPDX-",
    "Copyright",
    "COPYRIGHT",
    "copyright",
    "License",
    "LICENSE",
    "license",
    "Licence",
    "LICENCE",
    "licence",
    "This Source Code Form",
    "Permission is hereby granted",
    "All rights reserved",
    "Redistribution and use in source and binary forms",
    "Redistributions of source code must retain",
    "Redistributions in binary form must reproduce",
    "Neither the name of",
    "you may not use this file except in compliance",
    "You may obtain a copy",
    "You can obtain",
    "Unless required by applicable law",
    "distributed under the License",
    "WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND",
    "See the License for the specific language governing permissions",
    "THE SOFTWARE IS PROVIDED",
    "EXPRESS OR IMPLIED",
    "IN NO EVENT SHALL",
    "at the top-level directory of this distribution",
    "at your option",
    "option. This file may not be copied",
    "except according to those terms",
    "Part of the LLVM Project",
    "llvm.org/LICENSE.txt",
    "DO NOT EDIT",
    "Do not edit",
    "do not edit",
    "DO NOT MODIFY",
    "Do not modify",
    "do not modify",
    "Code generated",
    "Generated by",
    "generated by",
    "auto-generated",
    "autogenerated",
    "@generated",
    "<auto-generated",
    "NOLINT",
    "clang-tidy",
    "clang-format",
    "cppcheck-suppress",
    "cppcheck suppress",
    "IWYU pragma:",
    "coverity[",
    "GCOVR_EXCL",
    "LCOV_EXCL",
    "FALLTHROUGH",
    "FALLTHRU",
    "fallthrough",
    "fall through",
    "noqa",
    "type: ignore",
    "type:ignore",
    "mypy:",
    "pyright:",
    "ruff:",
    "pylint:",
    "flake8:",
    "black:",
    "fmt: off",
    "fmt: on",
    "fmt:off",
    "fmt:on",
    "isort:",
    "bandit:",
    "pyre-ignore",
    "pyre-fixme",
    "pragma: no cover",
    "coding:",
    "cython:",
    "distutils:",
    "eslint-",
    "eslint:",
    "@ts-ignore",
    "@ts-expect-error",
    "@ts-nocheck",
    "@ts-check",
    "/// <reference",
    "/// <amd-module",
    "/// <amd-dependency",
    "prettier-ignore",
    "biome-ignore",
    "deno-lint-ignore",
    "deno-fmt-ignore",
    "v8 ignore",
    "c8 ignore",
    "istanbul ignore",
    "node:coverage",
    "sourceMappingURL",
    "sourceURL",
    "webpack",
    "@vite-ignore",
    "rollup:",
    "esbuild:",
    "@preserve",
    "rustfmt",
    "clippy::",
    "cbindgen:",
    "rustbindgen",
    "Closing over",
    "No portable fallback for C is available",
    "All three forms of the variance are available in the same sizes.",
    "shellcheck",
    "hadolint",
    "yamllint",
    "yaml-language-server:",
    "actionlint",
    "cmake-format",
    "cmake-lint",
    "stylelint-",
    "buf:lint",
    "buf:breaking",
    "protolint",
    "syntax=",
    "escape=",
    "/*+",
    "/*!",
    "<!--[if",
    "<![endif]",
]

[languages.python]
name = "python"
extensions = [
    ".py",
    ".pyw",
    ".pyi",
    ".pyx",
    ".pxd",
    ".build",
    ".mozbuild",
    ".configure",
    ".gyp",
    ".gypi",
    ".sage",
    ".common",
]
comment_nodes = ["comment"]
doc_comment_nodes = ["string"]
remove_docs = false

[languages.cpp]
name = "cpp"
extensions = [
    ".cpp",
    ".cc",
    ".cxx",
    ".c++",
    ".hpp",
    ".hxx",
    ".hh",
    ".h++",
    ".inc",
    ".inl",
    ".webidl",
    ".idl",
    ".ipdl",
    ".ipdlh",
    ".y",
    ".yy",
    ".l",
    ".ll",
    ".api",
    ".map",
    ".symbols",
]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]

[languages.cuda]
name = "cuda"
extensions = [".cu", ".cuh"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]

[languages.make]
name = "make"
extensions = [".mk", ".mn"]
comment_nodes = ["comment"]

[languages.shell]
name = "shell"
extensions = [".sh", ".bash", ".zsh", ".guess"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]

[languages.cmake]
name = "cmake"
extensions = [".cmake"]
comment_nodes = ["line_comment", "bracket_comment"]

[languages.asm]
name = "asm"
extensions = [".s"]
comment_nodes = ["line_comment", "block_comment"]

[languages.x86asm]
name = "x86asm"
extensions = [".asm"]
comment_nodes = ["comment"]

[languages.glsl]
name = "glsl"
extensions = [".glsl", ".sksl"]
comment_nodes = ["comment"]

[languages.wgsl]
name = "wgsl"
extensions = [".wgsl"]
comment_nodes = ["line_comment", "block_comment"]

[languages.starlark]
name = "starlark"
extensions = [".bzl", ".bzlmod"]
comment_nodes = ["comment"]

[languages.ini]
name = "ini"
extensions = [
    ".ini",
    ".cfg",
    ".conf",
    ".properties",
    ".manifest",
    ".ftl",
    ".def",
]
comment_nodes = ["__mmltk_preserve_all_ini_like_comments__"]

[languages.proto]
name = "proto"
extensions = [".proto", ".fbs"]
comment_nodes = ["comment"]

[languages.perl]
name = "perl"
extensions = [".pl", ".pm", ".perl"]
comment_nodes = ["comment"]

[languages.yaml]
name = "yaml"
extensions = [".yaml", ".yml"]
comment_nodes = ["__mmltk_preserve_all_yaml_comments__"]
