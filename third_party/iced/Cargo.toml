[package]
name = "iced"
description = "A cross-platform GUI library inspired by Elm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
categories.workspace = true
keywords.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[badges]
maintenance = { status = "actively-developed" }

[features]
default = ["wgpu-bare", "crisp", "web-colors", "advanced", "fira-sans"]
wgpu = []
wgpu-bare = ["iced_renderer/wgpu-bare", "iced_widget/wgpu"]
tiny-skia = []
image = []
image-without-codecs = []
svg = []
canvas = []
qr_code = []
markdown = []
lazy = []
debug = []
time-travel = []
hot = []
tester = []
thread-pool = []
tokio = []
smol = []
sysinfo = []
web-colors = ["iced_renderer/web-colors"]
crisp = ["iced_core/crisp"]
webgl = []
highlighter = []
selector = []
advanced = ["iced_core/advanced", "iced_widget/advanced"]
fira-sans = ["iced_renderer/fira-sans"]
basic-shaping = []
advanced-shaping = []
hinting = []
strict-assertions = []
unconditional-rendering = []
sipper = []
linux-theme-detection = []
x11 = []
wayland = []

[dependencies]
iced_debug.workspace = true
iced_core.workspace = true
iced_futures.workspace = true
iced_renderer.workspace = true
iced_runtime.workspace = true
iced_widget.workspace = true
iced_winit.workspace = true

thiserror.workspace = true

[profile.release-opt]
inherits = "release"
codegen-units = 1
debug = false
lto = true
incremental = false
opt-level = 3
overflow-checks = false
strip = "debuginfo"

[workspace]
members = [
    "core",
    "debug",
    "futures",
    "graphics",
    "program",
    "renderer",
    "runtime",
    "wgpu",
    "widget",
    "winit",
]

[workspace.package]
version = "0.15.0-dev"
authors = ["Héctor Ramón Jiménez <hector@hecrj.dev>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/iced-rs/iced"
homepage = "https://iced.rs"
categories = ["gui"]
keywords = ["gui", "ui", "graphics", "interface", "widgets"]
rust-version = "1.92"

[workspace.dependencies]
iced = { version = "0.15.0-dev", path = "." }
iced_core = { version = "0.15.0-dev", path = "core" }
iced_debug = { version = "0.15.0-dev", path = "debug" }
iced_futures = { version = "0.15.0-dev", path = "futures" }
iced_graphics = { version = "0.15.0-dev", path = "graphics" }
iced_program = { version = "0.15.0-dev", path = "program" }
iced_renderer = { version = "0.15.0-dev", path = "renderer" }
iced_runtime = { version = "0.15.0-dev", path = "runtime" }
iced_wgpu = { version = "0.15.0-dev", path = "wgpu", default-features = false }
iced_widget = { version = "0.15.0-dev", path = "widget" }
iced_winit = { version = "0.15.0-dev", path = "winit", default-features = false }

arboard = { version = "3.6", default-features = false }
bincode = "1.3"
bitflags = "2.0"
bytemuck = { version = "1.0", features = ["derive"] }
bytes = "1.6"
cargo-hot = { version = "0.1", package = "cargo-hot-protocol" }
cosmic-text = "0.19"
cryoglyph = { git = "https://github.com/iced-rs/cryoglyph.git", rev = "53ba3e879539d19ed8162942126a977ec896cc3b" }
futures = { version = "0.3", default-features = false, features = ["std", "async-await"] }
glam = "0.33.2"
guillotiere = "0.6"
half = "2.2"
image = { version = "0.25", default-features = false }
kamadak-exif = "0.6"
kurbo = "0.10"
lilt = "0.8"
log = "0.4"
lyon = "1.0"
lyon_path = "1.0"
mundy = { version = "0.2", default-features = false }
nom = "8"
num-traits = "0.2"
ouroboros = "0.18"
png = "0.18"
pulldown-cmark = "0.12"
qrcode = { version = "0.13", default-features = false }
raw-window-handle = "0.6"
resvg = { version = "0.45", default-features = false }
rfd = "0.16"
rustc-hash = "2.0"
semver = "1.0"
serde = "1.0"
sha2 = "0.10"
sipper = "0.1"
smol = "2"
smol_str = "0.2"
softbuffer = { version = "0.4", default-features = false }
sysinfo = "0.33"
thiserror = "2"
tiny-skia = { version = "0.11", default-features = false, features = ["std", "simd"] }
tokio = "1.0"
tracing = "0.1"
two-face = { version = "0.4", default-features = false, features = ["syntect-default-fancy"] }
unicode-segmentation = "1.0"
url = "2.5"
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wasmtimer = "0.4.2"
web-sys = "=0.3.85"
web-time = "1.1"
wgpu = { version = "29", default-features = false, features = ["std", "wgsl"] }
winit = { git = "https://github.com/iced-rs/winit.git", rev = "05b8ff17a06562f0a10bb46e6eaacbe2a95cb5ed", default-features = false, features = ["rwh_06"] }

[workspace.lints.rust]
rust_2018_idioms = { level = "deny", priority = -1 }
missing_docs = "allow"
unsafe_code = "deny"
unused_results = "deny"

[workspace.lints.clippy]
type-complexity = "allow"
map-entry = "allow"
large-enum-variant = "allow"
result_large_err = "allow"
manual_filter = "allow"
semicolon_if_nothing_returned = "deny"
trivially-copy-pass-by-ref = "deny"
default_trait_access = "deny"
match-wildcard-for-single-variants = "deny"
redundant-closure-for-method-calls = "deny"
filter_map_next = "deny"
manual_let_else = "deny"
unused_async = "deny"
from_over_into = "deny"
needless_borrow = "deny"
new_without_default = "deny"
useless_conversion = "deny"

[workspace.lints.rustdoc]
broken_intra_doc_links = "forbid"
