
[package]
edition = "2021"
rust-version = "1.63"
name = "getrandom"
version = "0.3.3"
authors = ["The Rand Project Developers"]
build = false
exclude = [".*"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A small Linux library for retrieving random data from the system"
documentation = "https://docs.rs/getrandom"
categories = [
    "os",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-random/getrandom"

[package.metadata.docs.rs]
features = ["std"]

[features]
rustc-dep-of-std = [
    "dep:compiler_builtins",
    "dep:core",
]
std = []

[lib]
name = "getrandom"
path = "src/lib.rs"

[dependencies.cfg-if]
version = "1"

[dependencies.compiler_builtins]
version = "0.1"
optional = true

[dependencies.core]
version = "1.0"
optional = true
package = "rustc-std-workspace-core"

[dependencies.libc]
version = "0.2.154"
default-features = false

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
]
