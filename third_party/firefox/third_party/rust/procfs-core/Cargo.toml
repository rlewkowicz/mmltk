
[package]
edition = "2018"
rust-version = "1.70"
name = "procfs-core"
version = "0.18.0"
authors = ["Andrew Chin <achin@eminence32.net>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Data structures and parsing for the linux procfs pseudo-filesystem"
documentation = "https://docs.rs/procfs-core/"
keywords = [
    "procfs",
    "proc",
    "linux",
    "process",
]
categories = [
    "os::unix-apis",
    "filesystem",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/eminence/procfs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--generate-link-to-definition"]

[features]
default = ["chrono"]
serde1 = [
    "serde",
    "bitflags/serde",
]

[lib]
name = "procfs_core"
path = "src/lib.rs"

[dependencies.backtrace]
version = "0.3"
optional = true

[dependencies.bitflags]
version = "2"

[dependencies.chrono]
version = "0.4.20"
features = ["clock"]
optional = true
default-features = false

[dependencies.hex]
version = "0.4"

[dependencies.serde]
version = "1.0"
features = ["derive"]
optional = true
