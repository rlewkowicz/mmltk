
[package]
edition = "2021"
rust-version = "1.67.0"
name = "fluent-bundle"
version = "0.16.0"
authors = [
    "Caleb Maclennan <caleb@alerque.com>",
    "Bruce Mitchener <bruce.mitchener@gmail.com",
    "Zibi Braniecki <zibi@unicode.org>",
    "Staś Małolepszy <stas@mozilla.com>",
]
build = false
include = [
    "src/**/*",
    "benches/*.rs",
    "Cargo.toml",
    "README.md",
    "LICENSE-APACHE",
    "LICENSE-MIT",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
A low-level implementation of a collection of localization messages for a single locale for Project Fluent,
a localization system designed to unleash the entire expressive power of natural language translations.
"""
homepage = "https://www.projectfluent.org"
keywords = [
    "localization",
    "l10n",
    "i18n",
    "intl",
    "internationalization",
]
categories = [
    "localization",
    "internationalization",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/projectfluent/fluent-rs"

[features]
all-benchmarks = []
default = []

[lib]
name = "fluent_bundle"
path = "src/lib.rs"

[dependencies.fluent-langneg]
version = "0.13"

[dependencies.fluent-syntax]
version = "0.12.0"

[dependencies.intl-memoizer]
version = "0.5.3"

[dependencies.intl_pluralrules]
version = "7.0"

[dependencies.rustc-hash]
version = "2.1"

[dependencies.self_cell]
version = "1.2"

[dependencies.smallvec]
version = "1.13"

[dependencies.unic-langid]
version = "0.9"
