
[package]
edition = "2018"
name = "audio_thread_priority"
version = "0.35.1"
authors = ["Paul Adenot <paul@paul.cx>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Bump a thread to real-time priority for audio work on Linux"
license = "MPL-2.0"
repository = "https://github.com/padenot/audio_thread_priority"

[features]
default = []

[lib]
name = "audio_thread_priority"
crate-type = [
    "staticlib",
    "rlib",
]
path = "src/lib.rs"

[dependencies.dbus]
version = "0.6.4"

[dependencies.libc]
version = "0.2"

[dependencies.log]
version = "0.4"
