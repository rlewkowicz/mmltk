
[package]
edition = "2018"
rust-version = "1.48"
name = "nom"
version = "7.1.3"
authors = ["contact@geoffroycouprie.com"]
include = [
    "CHANGELOG.md",
    "LICENSE",
    "README.md",
    ".gitignore",
    "Cargo.toml",
    "src/*.rs",
    "src/*/*.rs",
    "tests/*.rs",
    "doc/nom_recipes.md",
]
autoexamples = false
description = "A byte-oriented, zero-copy, parser combinators library"
documentation = "https://docs.rs/nom"
keywords = [
    "parser",
    "parser-combinators",
    "parsing",
    "streaming",
    "bit",
]
categories = ["parsing"]
license = "MIT"
repository = "https://github.com/Geal/nom"

[package.metadata.docs.rs]
features = [
    "alloc",
    "std",
    "docsrs",
]
all-features = true

[profile.bench]
lto = true
codegen-units = 1
debug = true

[dependencies.memchr]
version = "2.3"
default-features = false

[dependencies.minimal-lexical]
version = "0.2.0"
default-features = false

[features]
alloc = []
default = ["std"]
docsrs = []
std = [
    "alloc",
    "memchr/std",
    "minimal-lexical/std",
]

[badges.coveralls]
branch = "main"
repository = "Geal/nom"
service = "github"

[badges.maintenance]
status = "actively-developed"

[badges.travis-ci]
repository = "Geal/nom"
