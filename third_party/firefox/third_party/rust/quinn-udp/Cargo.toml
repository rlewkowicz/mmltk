
[package]
edition = "2021"
rust-version = "1.80.0"
name = "quinn-udp"
version = "0.6.0"
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "UDP sockets with ECN information for the QUIC transport protocol"
keywords = ["quic"]
categories = [
    "network-programming",
    "asynchronous",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/quinn-rs/quinn"

[package.metadata.docs.rs]
all-features = true

[features]
default = [
    "tracing",
    "tracing-log",
]
log = ["dep:log"]
tracing-log = ["tracing/log"]

[lib]
name = "quinn_udp"
path = "src/lib.rs"

[dependencies.libc]
version = "0.2.175"

[dependencies.log]
version = "0.4"
optional = true

[dependencies.tracing]
version = "0.1.10"
features = ["std"]
optional = true
default-features = false

[build-dependencies.cfg_aliases]
version = "0.2"

[dependencies.socket2]
version = ">=0.5, <0.7"

[lints.clippy]
manual_let_else = "warn"
or_fun_call = "warn"
use_self = "warn"

[lints.rust]
elided_lifetimes_in_paths = "warn"
unnameable_types = "warn"
unreachable_pub = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
