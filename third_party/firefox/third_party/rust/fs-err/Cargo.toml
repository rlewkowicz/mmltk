
[package]
edition = "2018"
name = "fs-err"
version = "2.9.0"
authors = ["Andrew Hickman <andrew.hickman1@sky.com>"]
exclude = [
    ".github",
    ".gitignore",
    "README.tpl",
]
description = "A drop-in replacement for std::fs with more helpful error messages."
documentation = "https://docs.rs/fs-err"
categories = [
    "command-line-interface",
    "filesystem",
]
license = "MIT/Apache-2.0"
repository = "https://github.com/andrewhickman/fs-err"

[package.metadata.release]
tag-name = "{{version}}"
sign-tag = true

[[package.metadata.release.pre-release-replacements]]
file = "src/lib.rs"
search = 'html_root_url = "https://docs\.rs/fs-err/.*?"'
replace = "html_root_url = \"https://docs.rs/fs-err/{{version}}\""
exactly = 1

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[dependencies.tokio]
version = "1.21"
features = ["fs"]
optional = true
default_features = false

[features]
io_safety = []
