
[package]
edition = "2018"
name = "audioipc2-server"
version = "0.6.0"
authors = [
    "Matthew Gregan <kinetik@flim.org>",
    "Dan Glastonbury <dan.glastonbury@gmail.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Remote cubeb server"
license = "ISC"

[lib]
name = "audioipc2_server"
path = "src/lib.rs"

[dependencies]
cubeb-core = "0.34"
log = "0.4"
once_cell = "1.2.0"
slab = "0.4"

[dependencies.audio_thread_priority]
version = "0.35"
default-features = false

[dependencies.audioipc]
path = "../audioipc2"
package = "audioipc2"
