
[package]
edition = "2021"
rust-version = "1.82"
name = "zerotrie"
version = "0.2.2"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A data structure that efficiently maps strings to integers"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
alloc = []
databake = [
    "dep:databake",
    "zerovec?/databake",
]
default = []
litemap = [
    "dep:litemap",
    "alloc",
]
serde = [
    "dep:serde",
    "dep:litemap",
    "alloc",
    "litemap/serde",
    "zerovec?/serde",
]
yoke = ["dep:yoke"]
zerofrom = ["dep:zerofrom"]

[lib]
name = "zerotrie"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.litemap]
version = "0.8.0"
features = ["alloc"]
optional = true
default-features = false

[dependencies.serde]
version = "1.0.110"
optional = true
default-features = false

[dependencies.yoke]
version = "0.8.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.zerofrom]
version = "0.1.3"
optional = true
default-features = false

[dependencies.zerovec]
version = "0.11.1"
optional = true
default-features = false
