
[package]
edition = "2018"
name = "glslopt"
version = "0.1.14"
authors = ["Jamie Nicol <jnicol@mozilla.com>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Optimizes GLSL shader code"
keywords = [
    "opengl",
    "gl",
    "gles",
    "glsl",
    "shader",
]
license = "MIT"
repository = "https://github.com/jamienicol/glslopt-rs"

[lib]
name = "glslopt"
path = "src/lib.rs"

[build-dependencies.cc]
version = "1.0"
