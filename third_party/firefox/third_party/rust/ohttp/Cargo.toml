
[package]
edition = "2021"
rust-version = "1.83.0"
name = "ohttp"
version = "0.7.2"
authors = ["Martin Thomson <mt@lowentropy.net>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Oblivious HTTP"
homepage = "https://github.com/martinthomson/ohttp"
keywords = [
    "ohttp",
    "http",
    "bhttp",
    "ietf",
]
categories = [
    "network-programming",
    "web-programming",
    "security",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/martinthomson/ohttp"

[features]
app-svc = [
    "nss",
    "dep:mozbuild",
]
client = []
default = [
    "client",
    "server",
    "rust-hpke",
    "stream",
]
external-sqlite = []
gecko = [
    "nss",
    "dep:mozbuild",
]
nss = ["dep:bindgen"]
rust-hpke = [
    "dep:rand",
    "dep:aead",
    "dep:aes-gcm",
    "dep:chacha20poly1305",
    "dep:hkdf",
    "dep:sha2",
    "dep:hpke",
]
server = []
stream = [
    "dep:futures",
    "dep:pin-project",
]
unsafe-print-secrets = []

[lib]
name = "ohttp"
path = "src/lib.rs"

[dependencies]
byteorder = "1.4"
hex = "0.4"
thiserror = "2"

[dependencies.aead]
version = "0.5"
features = ["std"]
optional = true

[dependencies.aes-gcm]
version = "0.10"
optional = true

[dependencies.chacha20poly1305]
version = "0.10"
optional = true

[dependencies.futures]
version = "0.3"
optional = true

[dependencies.hkdf]
version = "0.12"
optional = true

[dependencies.hpke]
version = "0.13"
features = [
    "std",
    "x25519",
]
optional = true
default-features = false

[dependencies.log]
version = "0.4"
default-features = false

[dependencies.pin-project]
version = "1.1"
optional = true

[dependencies.rand]
version = "0.9"
optional = true

[dependencies.regex]
version = "~1.11"
optional = true

[dependencies.sha2]
version = "0.10"
optional = true

[build-dependencies]
serde = "1.0"
serde_derive = "1.0"
toml = ">=0.5,<=0.9"

[build-dependencies.bindgen]
version = "0.72"
features = ["runtime"]
optional = true
default-features = false

[build-dependencies.mozbuild]
version = "0.1"
optional = true
