
[package]
edition = "2018"
name = "cssparser-macros"
version = "0.7.0"
authors = ["Simon Sapin <simon.sapin@exyr.org>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Procedural macros for cssparser"
documentation = "https://docs.rs/cssparser-macros/"
license = "MPL-2.0"
repository = "https://github.com/servo/rust-cssparser"

[lib]
name = "cssparser_macros"
path = "lib.rs"
proc-macro = true

[dependencies.quote]
version = "1.0.29"

[dependencies.syn]
version = "2"
features = [
    "full",
    "extra-traits",
]
