
[package]
edition = "2021"
name = "mls-rs-codec-derive"
version = "0.2.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Derive macro crate for mls-rs-codec"
homepage = "https://github.com/awslabs/mls-rs"
keywords = [
    "mls",
    "mls-rs",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/awslabs/mls-rs"

[lib]
name = "mls_rs_codec_derive"
path = "src/lib.rs"
proc-macro = true

[dependencies.darling]
version = "0.20.3"

[dependencies.proc-macro2]
version = "1.0.54"

[dependencies.quote]
version = "1.0.26"

[dependencies.syn]
version = "2"
