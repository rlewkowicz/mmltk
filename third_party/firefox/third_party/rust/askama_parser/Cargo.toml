
[package]
edition = "2021"
rust-version = "1.83"
name = "askama_parser"
version = "0.14.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Parser for Askama templates"
homepage = "https://github.com/askama-rs/askama"
documentation = "https://docs.rs/askama"
keywords = [
    "markup",
    "template",
    "jinja2",
    "html",
]
categories = ["template-engine"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/askama-rs/askama"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--generate-link-to-definition",
    "--cfg=docsrs",
]

[features]
config = [
    "dep:serde",
    "dep:serde_derive",
]

[lib]
name = "askama_parser"
path = "src/lib.rs"

[dependencies.memchr]
version = "2"

[dependencies.serde]
version = "1.0"
optional = true

[dependencies.serde_derive]
version = "1.0"
optional = true

[dependencies.winnow]
version = "0.7.0"
