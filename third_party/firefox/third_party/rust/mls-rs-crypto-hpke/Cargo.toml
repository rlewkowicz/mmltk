
[package]
edition = "2021"
name = "mls-rs-crypto-hpke"
version = "0.20.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "HPKE implementation based on mls-rs-crypto-traits used by mls-rs"
homepage = "https://github.com/awslabs/mls-rs"
keywords = [
    "mls",
    "mls-rs",
    "HPKE",
]
categories = [
    "no-std",
    "cryptography",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/awslabs/mls-rs"

[features]
default = ["std"]
std = [
    "mls-rs-core/std",
    "mls-rs-crypto-traits/std",
    "dep:thiserror",
    "zeroize/std",
]
test_utils = ["mls-rs-core/test_suite"]

[lib]
name = "mls_rs_crypto_hpke"
path = "src/lib.rs"

[dependencies.cfg-if]
version = "^1"

[dependencies.maybe-async]
version = "0.2.10"

[dependencies.mls-rs-core]
version = "0.26.0"
default-features = false

[dependencies.mls-rs-crypto-traits]
version = "0.21.0"
default-features = false

[dependencies.thiserror]
version = "2"
optional = true

[dependencies.zeroize]
version = "1"
features = [
    "alloc",
    "zeroize_derive",
]
default-features = false

[target."cfg(mls_build_async)".dependencies.async-trait]
version = "0.1.74"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(mls_build_async)"]
