
[package]
edition = "2021"
name = "adblock"
version = "0.12.1"
authors = [
    "Anton Lazarev <alazarev@brave.com>",
    "Andrius Aucinas",
]
build = false
exclude = [
    "*.md",
    ".github/",
    ".gitignore",
    ".npmignore",
    "data/",
    "examples/",
    "js/",
    "package-lock.json",
    "package.json",
    "tests/",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Native Rust module for Adblock Plus syntax (e.g. EasyList, EasyPrivacy) filter parsing and matching."
license = "MPL-2.0"
repository = "https://github.com/brave/adblock-rust/"

[features]
content-blocking = []
css-validation = [
    "cssparser",
    "selectors",
]
debug-info = []
default = [
    "embedded-domain-resolver",
    "full-regex-handling",
    "single-thread",
]
embedded-domain-resolver = ["addr"]
full-regex-handling = []
resource-assembler = []
single-thread = []

[lib]
name = "adblock"
path = "src/lib.rs"

[dependencies.addr]
version = "0.15"
features = ["psl"]
optional = true
default-features = false

[dependencies.arrayvec]
version = "0.7"

[dependencies.base64]
version = "0.22"

[dependencies.bitflags]
version = "2.10.0"
features = ["serde"]

[dependencies.cssparser]
version = "0.34"
optional = true

[dependencies.flatbuffers]
version = "25.9.23"

[dependencies.idna]
version = "1.0.3"

[dependencies.itertools]
version = "0.13"

[dependencies.memchr]
version = "2.7"

[dependencies.once_cell]
version = "1.8"

[dependencies.percent-encoding]
version = "2.1"

[dependencies.precomputed-hash]
version = "0.1"

[dependencies.regex]
version = "1.12.2"

[dependencies.rustc-hash]
version = "1.1.0"
default-features = false

[dependencies.seahash]
version = "4.1.0"

[dependencies.selectors]
version = "0.26"
optional = true

[dependencies.serde]
version = "1.0.228"
features = [
    "derive",
    "rc",
]

[dependencies.serde_json]
version = "1.0.145"

[dependencies.thiserror]
version = "1.0"

[dependencies.url]
version = "2.5"

[lints.clippy]
len_zero = "allow"
uninlined_format_args = "warn"
