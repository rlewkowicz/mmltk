
[package]
edition = "2021"
name = "harfbuzz"
version = "0.6.0"
authors = ["The Servo Project Developers"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "High-level Rust bindings to the HarfBuzz text shaping engine"
documentation = "https://docs.rs/harfbuzz/"
keywords = [
    "opentype",
    "font",
    "text",
    "unicode",
    "shaping",
]
categories = ["text-processing"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/servo/rust-harfbuzz"

[features]
bundled = ["harfbuzz-sys/bundled"]
coretext = ["harfbuzz-sys/coretext"]
default = [
    "coretext",
    "directwrite",
    "freetype",
    "std",
]
directwrite = ["harfbuzz-sys/directwrite"]
freetype = ["harfbuzz-sys/freetype"]
std = []

[lib]
name = "harfbuzz"
path = "src/lib.rs"

[dependencies.harfbuzz-sys]
version = "0.6.1"
path = "../harfbuzz-sys"
default-features = false

[dependencies.harfbuzz-traits]
version = "0.6.0"
path = "../harfbuzz-traits"
default-features = false
