
[package]
edition = "2021"
rust-version = "1.67"
name = "codespan-reporting"
version = "0.13.1"
authors = ["Brendan Zabarauskas <bjzaba@yahoo.com.au>"]
build = false
exclude = ["assets/**"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Beautiful diagnostic reporting for text-based programming languages"
homepage = "https://github.com/brendanzab/codespan"
documentation = "https://docs.rs/codespan-reporting"
keywords = ["diagnostic-reporting"]
categories = [
    "compilers",
    "command-line-interface",
]
license = "Apache-2.0"
repository = "https://github.com/brendanzab/codespan"

[features]
ascii-only = []
default = [
    "std",
    "termcolor",
]
serialization = ["serde"]
std = ["serde?/std"]
termcolor = [
    "std",
    "dep:termcolor",
]

[lib]
name = "codespan_reporting"
path = "src/lib.rs"

[dependencies.serde]
version = "1"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false

[dependencies.termcolor]
version = "1.0.4"
optional = true

[dependencies.unicode-width]
version = ">=0.1,<0.3"

[lints.clippy]
alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
