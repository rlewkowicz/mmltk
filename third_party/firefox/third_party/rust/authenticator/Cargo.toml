
[package]
edition = "2018"
name = "authenticator"
version = "0.6.0"
authors = [
    "Dana Keeler <dkeeler@mozilla.com>",
    "J.C. Jones <jc@mozilla.com>",
    "John Schanck <jschanck@mozilla.com>",
    "Kyle Machulis <kyle@nonpolynomial.com>",
    "Martin Sirringhaus <martin.sirringhaus@suse.com",
    "Tim Taubert <ttaubert@mozilla.com>",
]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Library for interacting with CTAP1/2 security keys for Web Authentication. Used by Firefox."
keywords = [
    "ctap2",
    "u2f",
    "fido",
    "webauthn",
]
categories = [
    "cryptography",
    "hardware-support",
    "os",
]
license = "MPL-2.0"
repository = "https://github.com/mozilla/authenticator-rs/"

[badges.maintenance]
status = "actively-developed"

[badges.travis-ci]
branch = "master"
repository = "mozilla/authenticator-rs"

[features]
binding-recompile = ["bindgen"]
crypto_dummy = []
crypto_nss = [
    "nss-rs",
    "pkcs11-bindings",
]
crypto_openssl = [
    "openssl",
    "openssl-sys",
]
crypto_rust = [
    "aes",
    "cbc",
    "rand_core",
    "p256",
    "hmac",
]
default = ["crypto_nss"]
gecko = ["nss-rs/gecko"]

[lib]
name = "authenticator"
path = "src/lib.rs"

[dependencies]
base64 = "^0.21"
bitflags = "1.0"
cfg-if = "1.0"
libc = "0.2"
log = "0.4"
rand = "0.8"
runloop = "0.1.0"
serde_bytes = "0.11"
serde_json = "1.0"
sha2 = "^0.10.0"

[dependencies.aes]
version = "0.8"
optional = true

[dependencies.bytes]
version = "0.5"
features = ["serde"]
optional = true

[dependencies.cbc]
version = "0.1"
features = ["std"]
optional = true
default-features = false

[dependencies.hmac]
version = "0.12"
optional = true

[dependencies.nss-rs]
version = ">=0.12"
git = "https://github.com/mozilla/nss-rs"
optional = true

[dependencies.openssl]
version = "0.10"
optional = true

[dependencies.openssl-sys]
version = "0.9"
optional = true

[dependencies.p256]
version = "0.13"
features = [
    "arithmetic",
    "ecdsa",
    "ecdh",
    "std",
]
optional = true
default-features = false

[dependencies.pkcs11-bindings]
version = "0.1.4"
optional = true

[dependencies.rand_core]
version = "0.6"
features = ["getrandom"]
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_cbor]
version = "0.13"
package = "serde_cbor_2"

[build-dependencies.bindgen]
version = "^0.58.1"
optional = true

[target.'cfg(target_os = "linux")'.dependencies]
libudev = "^0.2"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
