
[package]
edition = "2021"
rust-version = "1.69"
name = "nix"
version = "0.30.1"
authors = ["The nix-rust Project Developers"]
build = "build.rs"
include = [
    "build.rs",
    "src/**/*",
    "test/**/*",
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust friendly bindings to *nix APIs"
categories = ["os::unix-apis"]
license = "MIT"
repository = "https://github.com/nix-rust/nix"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[features]
acct = []
aio = ["pin-utils"]
default = []
dir = ["fs"]
env = []
event = ["poll"]
fanotify = []
feature = []
fs = []
hostname = []
inotify = []
ioctl = []
kmod = []
mman = []
mount = ["uio"]
mqueue = ["fs"]
net = ["socket"]
personality = []
poll = []
process = []
pthread = []
ptrace = ["process"]
quota = []
reboot = []
resource = []
sched = ["process"]
signal = ["process"]
socket = ["memoffset"]
syslog = []
term = []
time = []
ucontext = ["signal"]
uio = []
user = ["feature"]
zerocopy = [
    "fs",
    "uio",
]

[lib]
name = "nix"
path = "src/lib.rs"

[dependencies.bitflags]
version = "2.3.3"

[dependencies.cfg-if]
version = "1.0"

[dependencies.libc]
version = "0.2.171"
features = ["extra_traits"]

[dependencies.memoffset]
version = "0.9"
optional = true

[dependencies.pin-utils]
version = "0.1.0"
optional = true

[build-dependencies.cfg_aliases]
version = "0.2.1"
