
[package]
edition = "2021"
name = "clubcard-crlite"
version = "0.4.0"
authors = ["John M. Schanck <jschanck@mozilla.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "An instantiation of Clubcard for use in CRLite"
license = "MPL-2.0"
repository = "https://github.com/mozilla/clubcard-crlite/"

[features]
bincode = ["dep:bincode"]
builder = [
    "dep:rand",
    "dep:serde_json",
    "clubcard/builder",
]
default = ["bincode"]

[lib]
name = "clubcard_crlite"
path = "src/lib.rs"

[dependencies.base64]
version = "0.21"

[dependencies.bincode]
version = "1.3"
optional = true

[dependencies.clubcard]
version = "0.3.3"

[dependencies.rand]
version = "0.8"
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1"
optional = true

[dependencies.sha2]
version = "0.10"
