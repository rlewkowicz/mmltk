
[package]
edition = "2021"
name = "mls-rs-provider-sqlite"
version = "0.22.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "SQLite based state storage for mls-rs"
homepage = "https://github.com/awslabs/mls-rs"
keywords = [
    "mls",
    "mls-rs",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/awslabs/mls-rs"

[features]
default = ["sqlcipher-bundled"]
sqlcipher = [
    "sqlite",
    "rusqlite/sqlcipher",
]
sqlcipher-bundled = [
    "sqlite",
    "rusqlite/bundled-sqlcipher",
]
sqlite = []
sqlite-bundled = [
    "sqlite",
    "rusqlite/bundled",
]

[lib]
name = "mls_rs_provider_sqlite"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.74"
maybe-async = "0.2.10"
thiserror = "2"

[dependencies.hex]
version = "0.4"

[dependencies.mls-rs-core]
version = "0.26"

[dependencies.rusqlite]
version = "0.37"
default-features = false

[dependencies.zeroize]
version = "1"
features = ["zeroize_derive"]

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(mls_build_async)"]
