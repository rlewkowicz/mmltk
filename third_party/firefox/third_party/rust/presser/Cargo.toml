
[package]
edition = "2021"
rust-version = "1.64"
name = "presser"
version = "0.3.1"
authors = [
    "Embark <opensource@embark-studios.com>",
    "Gray Olson <gray@grayolson.com",
]
publish = true
description = "A crate to help you copy things into raw buffers without invoking spooky action at a distance (undefined behavior)."
homepage = "https://github.com/EmbarkStudios/presser"
documentation = "https://docs.rs/presser"
keywords = [
    "copy",
    "graphics",
    "raw",
    "buffer",
    "memory",
]
categories = [
    "games",
    "memory-management",
    "graphics",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/EmbarkStudios/presser"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docs_build",
]

[lib]

[dependencies]

[features]
default = ["std"]
std = []
