
[package]
edition = "2021"
name = "rustc-hash"
version = "2.1.1"
authors = ["The Rust Project Developers"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A speedy, non-cryptographic hashing algorithm used by rustc"
keywords = [
    "hash",
    "hasher",
    "fxhash",
    "rustc",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/rust-lang/rustc-hash"

[features]
default = ["std"]
nightly = []
rand = [
    "dep:rand",
    "std",
]
std = []

[lib]
name = "rustc_hash"
path = "src/lib.rs"

[dependencies.rand]
version = "0.8"
optional = true
