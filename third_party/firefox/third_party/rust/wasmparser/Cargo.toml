
[package]
edition = "2021"
rust-version = "1.81.0"
name = "wasmparser"
version = "0.244.0"
authors = ["Yury Delendik <ydelendik@mozilla.com>"]
build = false
exclude = ["benches/*.wasm"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
A simple event-driven library for parsing WebAssembly binary files.
"""
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasmparser"
keywords = [
    "parser",
    "WebAssembly",
    "wasm",
]
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasmparser"

[package.metadata.docs.rs]
all-features = true

[features]
component-model = ["dep:semver"]
default = [
    "std",
    "validate",
    "serde",
    "features",
    "component-model",
    "hash-collections",
    "simd",
]
features = []
hash-collections = [
    "dep:hashbrown",
    "dep:indexmap",
]
prefer-btree-collections = []
serde = [
    "dep:serde",
    "indexmap?/serde",
    "hashbrown?/serde",
]
simd = []
std = ["indexmap?/std"]
validate = []

[lib]
name = "wasmparser"
path = "src/lib.rs"

[dependencies.bitflags]
version = "2.4.1"

[dependencies.hashbrown]
version = "0.15.2"
features = ["default-hasher"]
optional = true
default-features = false

[dependencies.indexmap]
version = "2.7.0"
optional = true
default-features = false

[dependencies.semver]
version = "1.0.0"
optional = true
default-features = false

[dependencies.serde]
version = "1.0.166"
features = ["alloc"]
optional = true
default-features = false

[lints.clippy]
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
deprecated-safe-2024 = "warn"
keyword_idents_2024 = "warn"
missing-unsafe-on-extern = "warn"
rust-2024-guarded-string-incompatible-syntax = "warn"
rust-2024-incompatible-pat = "warn"
rust-2024-prelude-collisions = "warn"
unsafe-attr-outside-unsafe = "warn"
unsafe-op-in-unsafe-fn = "warn"
unsafe_code = "deny"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
