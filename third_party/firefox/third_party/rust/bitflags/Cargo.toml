
[package]
edition = "2021"
rust-version = "1.56.0"
name = "bitflags"
version = "2.10.0"
authors = ["The Rust Project Developers"]
build = false
exclude = [
    "/tests",
    "/.github",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
A macro to generate structures which behave like bitflags.
"""
homepage = "https://github.com/bitflags/bitflags"
documentation = "https://docs.rs/bitflags"
keywords = [
    "bit",
    "bitmask",
    "bitflags",
    "flags",
]
categories = ["no-std"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/bitflags/bitflags"

[package.metadata.docs.rs]
features = ["example_generated"]

[features]
example_generated = []
serde = ["serde_core"]
std = []

[lib]
name = "bitflags"
path = "src/lib.rs"

[dependencies.arbitrary]
version = "1.0"
optional = true

[dependencies.bytemuck]
version = "1.12"
optional = true

[dependencies.serde_core]
version = "1.0.228"
optional = true
default-features = false
