
[package]
edition = "2018"
rust-version = "1.61"
name = "bytemuck_derive"
version = "1.9.3"
authors = ["Lokathor <zefria@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "derive proc-macros for `bytemuck`"
keywords = [
    "transmute",
    "bytes",
    "casting",
]
categories = [
    "encoding",
    "no-std",
]
license = "Zlib OR Apache-2.0 OR MIT"
repository = "https://github.com/Lokathor/bytemuck"

[lib]
name = "bytemuck_derive"
path = "src/lib.rs"
proc-macro = true

[dependencies.proc-macro2]
version = "1.0.60"

[dependencies.quote]
version = "1"

[dependencies.syn]
version = "2.0.1"
