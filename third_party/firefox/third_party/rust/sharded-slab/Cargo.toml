
[package]
edition = "2018"
rust-version = "1.42.0"
name = "sharded-slab"
version = "0.1.7"
authors = ["Eliza Weisman <eliza@buoyant.io>"]
description = """
A lock-free concurrent slab.
"""
homepage = "https://github.com/hawkw/sharded-slab"
documentation = "https://docs.rs/sharded-slab/"
keywords = [
    "slab",
    "allocator",
    "lock-free",
    "atomic",
]
categories = [
    "memory-management",
    "data-structures",
    "concurrency",
]
license = "MIT"
repository = "https://github.com/hawkw/sharded-slab"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[dependencies.lazy_static]
version = "1"

[target."cfg(loom)".dependencies.loom]
version = "0.5"
features = ["checkpoint"]
optional = true

[badges.maintenance]
status = "experimental"
