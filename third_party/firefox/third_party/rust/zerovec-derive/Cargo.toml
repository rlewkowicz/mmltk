
[package]
edition = "2021"
name = "zerovec-derive"
version = "0.11.1"
authors = ["Manish Goregaokar <manishsmail@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Custom derive for the zerovec crate"
keywords = [
    "zerocopy",
    "serialization",
    "zero-copy",
    "serde",
]
categories = [
    "rust-patterns",
    "memory-management",
    "caching",
    "no-std",
    "data-structures",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.workspaces]
independent = true

[lib]
name = "zerovec_derive"
path = "src/lib.rs"
proc-macro = true

[dependencies.proc-macro2]
version = "1.0.61"

[dependencies.quote]
version = "1.0.28"

[dependencies.syn]
version = "2.0.21"
features = ["extra-traits"]
