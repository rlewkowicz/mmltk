
[package]
edition = "2021"
rust-version = "1.73.0"
name = "bumpalo"
version = "3.15.4"
authors = ["Nick Fitzgerald <fitzgen@gmail.com>"]
exclude = [
    "/.github/*",
    "/benches",
    "/tests",
    "valgrind.supp",
    "bumpalo.png",
]
description = "A fast bump allocation arena for Rust."
documentation = "https://docs.rs/bumpalo"
categories = [
    "memory-management",
    "rust-patterns",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/fitzgen/bumpalo"

[package.metadata.docs.rs]
all-features = true

[lib]
path = "src/lib.rs"

[dependencies.allocator-api2]
version = "0.2.8"
optional = true
default-features = false

[features]
allocator_api = []
boxed = []
collections = []
default = []
std = []
