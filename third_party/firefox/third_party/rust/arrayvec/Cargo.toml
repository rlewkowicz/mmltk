
[package]
edition = "2018"
rust-version = "1.51"
name = "arrayvec"
version = "0.7.6"
authors = ["bluss"]
build = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A vector with fixed capacity, backed by an array (it can be stored on the stack too). Implements fixed capacity ArrayVec and ArrayString."
documentation = "https://docs.rs/arrayvec/"
keywords = [
    "stack",
    "vector",
    "array",
    "data-structure",
    "no_std",
]
categories = [
    "data-structures",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/bluss/arrayvec"

[package.metadata.docs.rs]
features = [
    "borsh",
    "serde",
    "zeroize",
]

[package.metadata.release]
no-dev-version = true
tag-name = "{{version}}"

[profile.bench]
debug = 2

[profile.release]
debug = 2

[lib]
name = "arrayvec"
path = "src/lib.rs"

[dependencies.borsh]
version = "1.2.0"
optional = true
default-features = false

[dependencies.serde]
version = "1.0"
optional = true
default-features = false

[dependencies.zeroize]
version = "1.4"
optional = true
default-features = false

[build-dependencies]

[features]
default = ["std"]
std = []
