
[package]
edition = "2021"
rust-version = "1.82"
name = "icu_collator_data"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = "build.rs"
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Data for the icu_collator crate"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.sources.cldr]
tagged = "47.0.0"

[package.metadata.sources.icuexport]
tagged = "icu4x/2025-05-01/77.x"

[package.metadata.sources.segmenter_lstm]
tagged = "v0.1.0"

[lib]
name = "icu_collator_data"
path = "src/lib.rs"

[dependencies]

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(icu4x_custom_data)"]
