
[package]
edition = "2021"
name = "mls-rs-identity-x509"
version = "0.20.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "X509 Identity utilities for mls-rs"
homepage = "https://github.com/awslabs/mls-rs"
keywords = [
    "mls",
    "mls-rs",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/awslabs/mls-rs"

[features]
default = ["std"]
std = [
    "mls-rs-core/std",
    "dep:thiserror",
]

[lib]
name = "mls_rs_identity_x509"
path = "src/lib.rs"

[dependencies.maybe-async]
version = "0.2.10"

[dependencies.mls-rs-core]
version = "0.26.0"
features = ["x509"]
default-features = false

[dependencies.thiserror]
version = "2"
optional = true

[target."cfg(mls_build_async)".dependencies.async-trait]
version = "0.1.74"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(mls_build_async)"]
