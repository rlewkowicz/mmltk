
[package]
edition = "2021"
name = "mls-rs-crypto-nss"
version = "0.2.1"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "NSS based CryptoProvider for mls-rs"
homepage = "https://github.com/awslabs/mls-rs"
keywords = [
    "mls",
    "mls-rs",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/awslabs/mls-rs"

[features]
default = ["std"]
gecko = ["nss-rs/gecko"]
std = [
    "mls-rs-core/std",
    "mls-rs-crypto-hpke/std",
    "mls-rs-crypto-traits/std",
    "getrandom/std",
    "rand_core/std",
    "dep:thiserror",
]

[lib]
name = "mls_rs_crypto_nss"
path = "src/lib.rs"

[dependencies]
maybe-async = "0.2"

[dependencies.getrandom]
version = "0.2"
default-features = false

[dependencies.hex]
version = "0.4"
features = ["serde"]

[dependencies.mls-rs-core]
version = "0.26"
default-features = false

[dependencies.mls-rs-crypto-hpke]
version = "0.20"
default-features = false

[dependencies.mls-rs-crypto-traits]
version = "0.21"
default-features = false

[dependencies.nss-rs]
version = "0.13"
git = "https://github.com/mozilla/nss-rs"
default-features = false

[dependencies.rand_core]
version = "0.6"
features = ["alloc"]
default-features = false

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.thiserror]
version = "2"
optional = true

[dependencies.zeroize]
version = "1"
features = [
    "alloc",
    "zeroize_derive",
]
default-features = false

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(mls_build_async)"]
