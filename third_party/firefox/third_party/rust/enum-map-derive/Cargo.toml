
[package]
edition = "2021"
rust-version = "1.61"
name = "enum-map-derive"
version = "0.17.0"
authors = ["Kamila Borowska <kamila@borowska.pw>"]
description = "Macros 1.1 implementation of #[derive(Enum)]"
keywords = [
    "data-structure",
    "no_std",
    "enum",
]
categories = [
    "data-structures",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://codeberg.org/xfix/enum-map"

[lib]
proc-macro = true

[dependencies.proc-macro2]
version = "1.0.60"

[dependencies.quote]
version = "1.0.7"

[dependencies.syn]
version = "2.0.0"
features = [
    "derive",
    "parsing",
    "printing",
    "proc-macro",
]
default-features = false

[badges.maintenance]
status = "passively-maintained"
