
[package]
edition = "2021"
rust-version = "1.87"
name = "wgpu-naga-bridge"
version = "30.0.0"
authors = ["gfx-rs developers"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Conversions between naga and wgpu-types. Part of the wgpu project"
homepage = "https://wgpu.rs/"
keywords = ["graphics"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gfx-rs/wgpu"

[lib]
name = "wgpu_naga_bridge"
path = "src/lib.rs"

[dependencies.naga]
version = "30.0.0"
path = "../naga"

[dependencies.wgpu-types]
version = "30.0.0"
path = "../wgpu-types"
default-features = false

[lints.clippy]
ref_as_ptr = "warn"

[lints.rust]
missing_debug_implementations = "warn"
