
[package]
edition = "2018"
name = "sha2"
version = "0.10.8"
authors = ["RustCrypto Developers"]
description = """
Pure Rust implementation of the SHA-2 hash function family
including SHA-224, SHA-256, SHA-384, and SHA-512.
"""
documentation = "https://docs.rs/sha2"
keywords = [
    "crypto",
    "sha2",
    "hash",
    "digest",
]
categories = [
    "cryptography",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/RustCrypto/hashes"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[dependencies.cfg-if]
version = "1.0"

[dependencies.digest]
version = "0.10.7"

[features]
asm = ["sha2-asm"]
asm-aarch64 = ["asm"]
compress = []
default = ["std"]
force-soft = []
loongarch64_asm = []
oid = ["digest/oid"]
std = ["digest/std"]

[target."cfg(any(target_arch = \"aarch64\", target_arch = \"x86_64\", target_arch = \"x86\"))".dependencies.cpufeatures]
version = "0.2"

[target."cfg(any(target_arch = \"aarch64\", target_arch = \"x86_64\", target_arch = \"x86\"))".dependencies.sha2-asm]
version = "0.6.1"
optional = true
