
[package]
edition = "2021"
rust-version = "1.75"
name = "zlib-rs"
version = "0.6.3"
build = false
publish = true
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A memory-safe zlib implementation written in rust"
homepage = "https://github.com/trifectatechfoundation/zlib-rs"
license = "Zlib"
repository = "https://github.com/trifectatechfoundation/zlib-rs"

[features]
ZLIB_DEBUG = []
__internal-api = []
__internal-test = ["quickcheck"]
avx512 = ["vpclmulqdq"]
c-allocator = []
default = [
    "std",
    "c-allocator",
]
rust-allocator = []
std = ["rust-allocator"]
vpclmulqdq = []

[lib]
name = "zlib_rs"
path = "src/lib.rs"

[dependencies.arbitrary]
version = "1.0"
features = ["derive"]
optional = true

[dependencies.quickcheck]
version = "1.0.3"
features = []
optional = true
default-features = false

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
