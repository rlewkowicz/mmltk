
[package]
edition = "2018"
name = "rand"
version = "0.8.6"
authors = [
    "The Rand Project Developers",
    "The Rust Project Developers",
]
build = false
include = [
    "src/",
    "LICENSE-*",
    "README.md",
    "CHANGELOG.md",
    "COPYRIGHT",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Random number generators and other randomness functionality.
"""
homepage = "https://rust-random.github.io/book"
documentation = "https://docs.rs/rand"
keywords = [
    "random",
    "rng",
]
categories = [
    "algorithms",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-random/rand"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--generate-link-to-definition"]

[package.metadata.playground]
features = [
    "small_rng",
    "serde1",
]

[features]
alloc = ["rand_core/alloc"]
default = [
    "std",
    "std_rng",
]
getrandom = ["rand_core/getrandom"]
log = []
min_const_gen = []
nightly = []
serde1 = [
    "serde",
    "rand_core/serde1",
]
small_rng = []
std = [
    "rand_core/std",
    "rand_chacha/std",
    "alloc",
    "getrandom",
    "libc",
]
std_rng = ["rand_chacha"]

[lib]
name = "rand"
path = "src/lib.rs"

[dependencies.rand_chacha]
version = "0.3.0"
optional = true
default-features = false

[dependencies.rand_core]
version = "0.6.0"

[dependencies.serde]
version = "1.0.103"
features = ["derive"]
optional = true

[target."cfg(unix)".dependencies.libc]
version = "0.2.22"
optional = true
default-features = false
