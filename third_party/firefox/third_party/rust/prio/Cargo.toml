
[package]
edition = "2021"
rust-version = "1.71"
name = "prio"
version = "0.16.2"
authors = [
    "Josh Aas <jaas@kflag.net>",
    "Tim Geoghegan <timg@letsencrypt.org>",
    "Christopher Patton <cpatton@cloudflare.com",
    "Karl Tarbe <tarbe@apple.com>",
]
exclude = ["/supply-chain"]
description = "Implementation of the Prio aggregation system core: https://crypto.stanford.edu/prio/"
license = "MPL-2.0"
repository = "https://github.com/divviup/libprio-rs"
resolver = "2"

[package.metadata.cargo-all-features]
skip_optional_dependencies = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[lib]

[dependencies.aes]
version = "0.8.4"
optional = true

[dependencies.bitvec]
version = "1.0.1"
optional = true

[dependencies.byteorder]
version = "1.5.0"

[dependencies.ctr]
version = "0.9.2"
optional = true

[dependencies.fiat-crypto]
version = "0.2.6"
optional = true

[dependencies.fixed]
version = "1.26"
optional = true

[dependencies.getrandom]
version = "0.2.12"
features = ["std"]

[dependencies.hex]
version = "0.4.3"
features = ["serde"]
optional = true

[dependencies.hmac]
version = "0.12.1"
optional = true

[dependencies.num-bigint]
version = "0.4.4"
features = [
    "rand",
    "serde",
]
optional = true

[dependencies.num-integer]
version = "0.1.46"
optional = true

[dependencies.num-iter]
version = "0.1.44"
optional = true

[dependencies.num-rational]
version = "0.4.1"
features = ["serde"]
optional = true

[dependencies.num-traits]
version = "0.2.18"
optional = true

[dependencies.rand]
version = "0.8"
optional = true

[dependencies.rand_core]
version = "0.6.4"

[dependencies.rayon]
version = "1.9.0"
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"
optional = true

[dependencies.sha2]
version = "0.10.8"
optional = true

[dependencies.sha3]
version = "0.10.8"

[dependencies.subtle]
version = "2.5.0"

[dependencies.thiserror]
version = "1.0"

[dependencies.zipf]
version = "7.0.1"
optional = true

[features]
crypto-dependencies = [
    "aes",
    "ctr",
    "hmac",
    "sha2",
]
default = ["crypto-dependencies"]
experimental = [
    "bitvec",
    "fiat-crypto",
    "fixed",
    "num-bigint",
    "num-rational",
    "num-traits",
    "num-integer",
    "num-iter",
    "rand",
]
multithreaded = ["rayon"]
test-util = [
    "hex",
    "rand",
    "serde_json",
    "zipf",
]
