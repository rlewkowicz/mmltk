
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_casemap"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Unicode case mapping and folding algorithms"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-all-features]
skip_optional_dependencies = true

[features]
compiled_data = [
    "dep:icu_casemap_data",
    "icu_properties/compiled_data",
    "icu_provider/baked",
]
datagen = [
    "serde",
    "dep:databake",
    "zerovec/databake",
    "icu_collections/databake",
    "icu_provider/export",
]
default = ["compiled_data"]
serde = [
    "dep:serde",
    "zerovec/serde",
    "icu_collections/serde",
    "icu_provider/serde",
    "icu_properties/serde",
    "potential_utf/serde",
]

[lib]
name = "icu_casemap"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.icu_casemap_data]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_collections]
version = "~2.1.1"
features = ["alloc"]
default-features = false

[dependencies.icu_locale_core]
version = "2.1.1"
features = ["alloc"]
default-features = false

[dependencies.icu_properties]
version = "~2.1.1"
default-features = false

[dependencies.icu_provider]
version = "2.1.1"
features = ["alloc"]
default-features = false

[dependencies.potential_utf]
version = "0.1.3"
features = [
    "alloc",
    "zerovec",
]
default-features = false

[dependencies.serde]
version = "1.0.220"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false

[dependencies.writeable]
version = "0.6.0"
default-features = false

[dependencies.zerovec]
version = "0.11.3"
features = [
    "alloc",
    "yoke",
]
default-features = false
