
[package]
edition = "2018"
rust-version = "1.65.0"
name = "tracing-subscriber"
version = "0.3.20"
authors = [
    "Eliza Weisman <eliza@buoyant.io>",
    "David Barsky <me@davidbarsky.com>",
    "Tokio Contributors <team@tokio.rs>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Utilities for implementing and composing `tracing` subscribers.
"""
homepage = "https://tokio.rs"
keywords = [
    "logging",
    "tracing",
    "metrics",
    "subscriber",
]
categories = [
    "development-tools::debugging",
    "development-tools::profiling",
    "asynchronous",
]
license = "MIT"
repository = "https://github.com/tokio-rs/tracing"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[badges.maintenance]
status = "experimental"

[features]
alloc = []
ansi = [
    "fmt",
    "nu-ansi-term",
]
default = [
    "smallvec",
    "fmt",
    "ansi",
    "tracing-log",
    "std",
]
env-filter = [
    "matchers",
    "once_cell",
    "tracing",
    "std",
    "thread_local",
    "dep:regex-automata",
]
fmt = [
    "registry",
    "std",
]
json = [
    "tracing-serde",
    "serde",
    "serde_json",
]
local-time = ["time/local-offset"]
nu-ansi-term = ["dep:nu-ansi-term"]
regex = []
registry = [
    "sharded-slab",
    "thread_local",
    "std",
]
std = [
    "alloc",
    "tracing-core/std",
]
valuable = [
    "tracing-core/valuable",
    "valuable_crate",
    "valuable-serde",
    "tracing-serde/valuable",
]

[lib]
name = "tracing_subscriber"
path = "src/lib.rs"

[dependencies.chrono]
version = "0.4.26"
features = [
    "clock",
    "std",
]
optional = true
default-features = false

[dependencies.matchers]
version = "0.2.0"
optional = true

[dependencies.nu-ansi-term]
version = "0.50.0"
optional = true

[dependencies.once_cell]
version = "1.13.0"
optional = true

[dependencies.parking_lot]
version = "0.12.1"
optional = true

[dependencies.regex-automata]
version = "0.4"
features = ["std"]
optional = true
default-features = false

[dependencies.serde]
version = "1.0.140"
optional = true

[dependencies.serde_json]
version = "1.0.82"
optional = true

[dependencies.sharded-slab]
version = "0.1.4"
optional = true

[dependencies.smallvec]
version = "1.9.0"
optional = true

[dependencies.thread_local]
version = "1.1.4"
optional = true

[dependencies.time]
version = "0.3.2"
features = ["formatting"]
optional = true

[dependencies.tracing]
version = "0.1.41"
optional = true
default-features = false

[dependencies.tracing-core]
version = "0.1.33"
default-features = false

[dependencies.tracing-log]
version = "0.2.0"
features = [
    "log-tracer",
    "std",
]
optional = true
default-features = false

[dependencies.tracing-serde]
version = "0.2.0"
optional = true

[target."cfg(tracing_unstable)".dependencies.valuable-serde]
version = "0.1.0"
optional = true
default-features = false

[target."cfg(tracing_unstable)".dependencies.valuable_crate]
version = "0.1.0"
optional = true
default-features = false
package = "valuable"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(flaky_tests)",
    "cfg(tracing_unstable)",
    "cfg(unsound_local_offset)",
]
