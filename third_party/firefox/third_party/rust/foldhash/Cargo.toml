
[package]
edition = "2021"
rust-version = "1.60"
name = "foldhash"
version = "0.2.0"
authors = ["Orson Peters <orsonpeters@gmail.com>"]
build = false
exclude = [
    "benches",
    "tools",
    "assets",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A fast, non-cryptographic, minimally DoS-resistant hashing algorithm."
keywords = [
    "hash",
    "hasher",
    "no-std",
]
categories = [
    "algorithms",
    "no-std",
]
license = "Zlib"
repository = "https://github.com/orlp/foldhash"

[features]
default = ["std"]
nightly = []
std = []

[lib]
name = "foldhash"
path = "src/lib.rs"

[dependencies]

[profile.release]
lto = "thin"
