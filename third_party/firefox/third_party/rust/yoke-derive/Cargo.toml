
[package]
edition = "2021"
name = "yoke-derive"
version = "0.8.0"
authors = ["Manish Goregaokar <manishsmail@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Custom derive for the yoke crate"
keywords = [
    "zerocopy",
    "serialization",
    "lifetime",
    "borrow",
    "self-referential",
]
categories = [
    "data-structures",
    "memory-management",
    "caching",
    "no-std",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.workspaces]
independent = true

[lib]
name = "yoke_derive"
path = "src/lib.rs"
proc-macro = true

[dependencies.proc-macro2]
version = "1.0.61"

[dependencies.quote]
version = "1.0.28"

[dependencies.syn]
version = "2.0.21"
features = ["fold"]

[dependencies.synstructure]
version = "0.13.0"
