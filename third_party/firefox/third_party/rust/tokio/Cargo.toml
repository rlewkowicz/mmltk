
[package]
edition = "2021"
rust-version = "1.71"
name = "tokio"
version = "1.52.3"
authors = ["Tokio Contributors <team@tokio.rs>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
An event-driven, non-blocking I/O platform for writing asynchronous I/O
backed applications.
"""
homepage = "https://tokio.rs"
keywords = [
    "io",
    "async",
    "non-blocking",
    "futures",
]
categories = [
    "asynchronous",
    "network-programming",
]
license = "MIT"
repository = "https://github.com/tokio-rs/tokio"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
    "--cfg",
    "tokio_unstable",
]
rustc-args = [
    "--cfg",
    "tokio_unstable",
]

[package.metadata.playground]
features = [
    "full",
    "test-util",
]

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "bytes::buf::buf_impl::Buf",
    "bytes::buf::buf_mut::BufMut",
    "tokio_macros::*",
]

[features]
default = []
fs = []
full = [
    "fs",
    "io-util",
    "io-std",
    "macros",
    "net",
    "parking_lot",
    "process",
    "rt",
    "rt-multi-thread",
    "signal",
    "sync",
    "time",
]
io-std = []
io-uring = [
    "dep:io-uring",
    "libc",
    "mio/os-poll",
    "mio/os-ext",
    "dep:slab",
]
io-util = ["bytes"]
macros = ["tokio-macros"]
net = [
    "libc",
    "mio/os-poll",
    "mio/os-ext",
    "mio/net",
    "socket2",
]
process = [
    "bytes",
    "libc",
    "mio/os-poll",
    "mio/os-ext",
    "mio/net",
    "signal-hook-registry",
]
rt = []
rt-multi-thread = ["rt"]
signal = [
    "libc",
    "mio/os-poll",
    "mio/net",
    "mio/os-ext",
    "signal-hook-registry",
]
sync = []
taskdump = ["dep:backtrace"]
test-util = [
    "rt",
    "sync",
    "time",
]
time = []

[lib]
name = "tokio"
path = "src/lib.rs"

[dependencies.bytes]
version = "1.2.1"
optional = true

[dependencies.mio]
version = "1.2.0"
optional = true
default-features = false

[dependencies.parking_lot]
version = "0.12.0"
optional = true

[dependencies.pin-project-lite]
version = "0.2.11"

[dependencies.tokio-macros]
version = "~2.7.0"
optional = true

[target.'cfg(all(tokio_unstable, target_os = "linux"))'.dependencies.backtrace]
version = "0.3.58"
optional = true

[target.'cfg(all(tokio_unstable, target_os = "linux"))'.dependencies.io-uring]
version = "0.7.11"
optional = true
default-features = false

[target.'cfg(all(tokio_unstable, target_os = "linux"))'.dependencies.libc]
version = "0.2.168"
optional = true

[target.'cfg(all(tokio_unstable, target_os = "linux"))'.dependencies.mio]
version = "1.2.0"
features = [
    "os-poll",
    "os-ext",
]
optional = true
default-features = false

[target.'cfg(all(tokio_unstable, target_os = "linux"))'.dependencies.slab]
version = "0.4.9"
optional = true

[target."cfg(tokio_unstable)".dependencies.tracing]
version = "0.1.29"
features = ["std"]
optional = true
default-features = false

[target."cfg(unix)".dependencies.libc]
version = "0.2.168"
optional = true

[target."cfg(unix)".dependencies.signal-hook-registry]
version = "1.1.1"
optional = true

[target.'cfg(target_os = "linux")'.dependencies.socket2]
version = "0.6.3"
features = ["all"]
optional = true

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
