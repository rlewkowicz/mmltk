
[package]
edition = "2018"
rust-version = "1.47.0"
name = "unicode-bidi"
version = "0.3.15"
authors = ["The Servo Project Developers"]
build = false
exclude = [
    "benches/**",
    "data/**",
    "examples/**",
    "tests/**",
    "tools/**",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Implementation of the Unicode Bidirectional Algorithm"
documentation = "https://docs.rs/unicode-bidi/"
keywords = [
    "rtl",
    "unicode",
    "text",
    "layout",
    "bidi",
]
categories = [
    "no-std",
    "encoding",
    "text-processing",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/servo/unicode-bidi"

[badges.appveyor]
repository = "servo/unicode-bidi"

[features]
bench_it = []
default = [
    "std",
    "hardcoded-data",
]
flame_it = [
    "flame",
    "flamer",
]
hardcoded-data = []
std = []
unstable = []
with_serde = ["serde"]

[lib]
name = "unicode_bidi"
path = "src/lib.rs"

[dependencies.flame]
version = "0.2"
optional = true

[dependencies.flamer]
version = "0.4"
optional = true

[dependencies.serde]
version = ">=0.8, <2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.smallvec]
version = ">=1.13"
features = ["union"]
optional = true
