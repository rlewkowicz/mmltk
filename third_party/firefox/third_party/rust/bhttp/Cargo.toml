
[package]
edition = "2021"
rust-version = "1.83.0"
name = "bhttp"
version = "0.7.2"
authors = ["Martin Thomson <mt@lowentropy.net>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Binary HTTP messages (RFC 9292)"
homepage = "https://github.com/martinthomson/ohttp"
keywords = [
    "ohttp",
    "http",
    "bhttp",
    "ietf",
]
categories = [
    "network-programming",
    "web-programming",
    "security",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/martinthomson/ohttp"

[features]
default = []
http = ["dep:url"]
stream = [
    "dep:futures",
    "dep:pin-project",
]

[lib]
name = "bhttp"
path = "src/lib.rs"

[dependencies.futures]
version = "0.3"
optional = true

[dependencies.pin-project]
version = "1.1"
optional = true

[dependencies.thiserror]
version = "2"

[dependencies.url]
version = "2"
optional = true
