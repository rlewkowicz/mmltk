
[package]
edition = "2018"
name = "subtle"
version = "2.6.1"
authors = [
    "Isis Lovecruft <isis@patternsinthevoid.net>",
    "Henry de Valence <hdevalence@hdevalence.ca>",
]
build = false
exclude = [
    "**/.gitignore",
    ".travis.yml",
]
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Pure-Rust traits and utilities for constant-time cryptographic implementations."
homepage = "https://dalek.rs/"
documentation = "https://docs.rs/subtle"
keywords = [
    "cryptography",
    "crypto",
    "constant-time",
    "utilities",
]
categories = [
    "cryptography",
    "no-std",
]
license = "BSD-3-Clause"
repository = "https://github.com/dalek-cryptography/subtle"

[lib]
name = "subtle"
path = "src/lib.rs"

[features]
const-generics = []
core_hint_black_box = []
default = [
    "std",
    "i128",
]
i128 = []
nightly = []
std = []

[badges.travis-ci]
branch = "main"
repository = "dalek-cryptography/subtle"
