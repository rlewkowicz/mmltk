
[package]
edition = "2021"
rust-version = "1.57"
name = "bytes"
version = "1.11.1"
authors = [
    "Carl Lerche <me@carllerche.com>",
    "Sean McArthur <sean@seanmonstar.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Types and traits for working with bytes"
keywords = [
    "buffers",
    "zero-copy",
    "io",
]
categories = [
    "network-programming",
    "data-structures",
]
license = "MIT"
repository = "https://github.com/tokio-rs/bytes"

[package.metadata.docs.rs]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
default = ["std"]
std = []

[lib]
name = "bytes"
path = "src/lib.rs"

[dependencies.extra-platforms]
version = "1.3"
features = ["require-cas"]
optional = true
default-features = false
package = "portable-atomic"

[dependencies.serde]
version = "1.0.60"
features = ["alloc"]
optional = true
default-features = false

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(loom)"]
