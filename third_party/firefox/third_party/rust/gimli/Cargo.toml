
[package]
edition = "2018"
rust-version = "1.60"
name = "gimli"
version = "0.32.3"
build = false
include = [
    "/CHANGELOG.md",
    "/Cargo.toml",
    "/LICENSE-APACHE",
    "/LICENSE-MIT",
    "/README.md",
    "/src",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A library for reading and writing the DWARF debugging format."
documentation = "https://docs.rs/gimli"
keywords = [
    "DWARF",
    "debug",
    "ELF",
    "eh_frame",
]
categories = [
    "development-tools::debugging",
    "development-tools::profiling",
    "parser-implementations",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gimli-rs/gimli"
resolver = "2"

[features]
default = [
    "read-all",
    "write",
]
endian-reader = [
    "read",
    "dep:stable_deref_trait",
]
fallible-iterator = ["dep:fallible-iterator"]
read = ["read-core"]
read-all = [
    "read",
    "std",
    "fallible-iterator",
    "endian-reader",
]
read-core = []
rustc-dep-of-std = [
    "dep:core",
    "dep:alloc",
]
std = [
    "fallible-iterator?/std",
    "stable_deref_trait?/std",
]
write = ["dep:indexmap"]

[lib]
name = "gimli"
path = "src/lib.rs"

[dependencies.alloc]
version = "1.0.0"
optional = true
package = "rustc-std-workspace-alloc"

[dependencies.core]
version = "1.0.0"
optional = true
package = "rustc-std-workspace-core"

[dependencies.fallible-iterator]
version = "0.3.0"
optional = true
default-features = false

[dependencies.indexmap]
version = "2.0.0"
optional = true

[dependencies.stable_deref_trait]
version = "1.1.0"
optional = true
default-features = false

[profile.bench]
codegen-units = 1
debug = 2
split-debuginfo = "packed"

[profile.test]
split-debuginfo = "packed"
