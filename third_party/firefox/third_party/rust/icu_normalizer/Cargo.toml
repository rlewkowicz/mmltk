
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_normalizer"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "API for normalizing text into Unicode Normalization Forms"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
compiled_data = [
    "dep:icu_normalizer_data",
    "icu_properties?/compiled_data",
    "icu_provider/baked",
]
datagen = [
    "serde",
    "dep:databake",
    "icu_properties",
    "icu_collections/databake",
    "zerovec/databake",
    "icu_properties?/datagen",
    "icu_provider/export",
]
default = [
    "compiled_data",
    "utf8_iter",
    "utf16_iter",
]
experimental = []
icu_properties = ["dep:icu_properties"]
serde = [
    "dep:serde",
    "icu_collections/serde",
    "zerovec/serde",
    "icu_properties?/serde",
    "icu_provider/serde",
]
utf16_iter = [
    "dep:utf16_iter",
    "dep:write16",
]
utf8_iter = ["dep:utf8_iter"]
latin1 = ["dep:write16"]
harfbuzz_traits = ["dep:harfbuzz-traits"]

[lib]
name = "icu_normalizer"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.harfbuzz-traits]
version = "0.6.0"
default-features = false
optional = true

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.icu_collections]
version = "~2.1.1"
default-features = false

[dependencies.icu_normalizer_data]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_properties]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_provider]
version = "2.1.1"
default-features = false

[dependencies.serde]
version = "1.0.220"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false

[dependencies.smallvec]
version = "1.10.0"
default-features = false

[dependencies.utf16_iter]
version = "1.0.2"
optional = true
default-features = false
features = ["icu_collections"]

[dependencies.utf8_iter]
version = "1.0.2"
optional = true
default-features = false
features = ["icu_collections"]

[dependencies.write16]
version = "1.0.0"
features = ["alloc"]
optional = true
default-features = false

[dependencies.zerovec]
version = "0.11.3"
default-features = false

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(icu4x_unstable_fast_trie_only)"]
