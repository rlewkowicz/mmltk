
[package]
edition = "2021"
rust-version = "1.87"
name = "wgpu-core"
version = "30.0.0"
authors = ["gfx-rs developers"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Core implementation logic of wgpu, the cross-platform, safe, pure-rust graphics API"
homepage = "https://wgpu.rs/"
keywords = ["graphics"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gfx-rs/wgpu"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[package.metadata.cargo-machete]
ignored = ["cfg_aliases"]

[features]
api_log_info = []
counters = ["wgpu-types/counters"]
default = ["std"]
drm = ["wgpu-core-deps-linux/drm"]
glsl = ["naga/glsl-in"]
noop = []
portable-atomic = [
    "dep:portable-atomic",
    "wgpu-hal/portable-atomic",
]
renderdoc = ["wgpu-core-deps-linux/renderdoc"]
resource_log_info = []
serde = [
    "dep:serde",
    "wgpu-types/serde",
    "arrayvec/serde",
    "hashbrown/serde",
    "smallvec/serde",
    "macro_rules_attribute",
]
spirv = ["naga/spv-in"]
std = []
strict_asserts = ["wgpu-types/strict_asserts"]
vulkan = ["wgpu-core-deps-linux/vulkan"]
wgsl = ["naga/wgsl-in"]

[lib]
name = "wgpu_core"
path = "src/lib.rs"

[dependencies.arrayvec]
version = "0.7.1"
default-features = false

[dependencies.bit-set]
version = "0.10"
default-features = false

[dependencies.bit-vec]
version = "0.9.1"
default-features = false

[dependencies.bitflags]
version = "2.9"

[dependencies.bytemuck]
version = "1.22"
features = [
    "extern_crate_alloc",
    "min_const_generics",
]

[dependencies.document-features]
version = "0.2.10"

[dependencies.hashbrown]
version = "0.17"
features = [
    "default-hasher",
    "inline-more",
]
default-features = false

[dependencies.indexmap]
version = "2.11.4"
default-features = false

[dependencies.log]
version = "0.4.29"

[dependencies.macro_rules_attribute]
version = "0.2"
optional = true

[dependencies.naga]
version = "30.0.0"
path = "../naga"

[dependencies.naga-types]
version = "30.0.0"
path = "../naga-types"

[dependencies.once_cell]
version = "1.21"
features = ["std"]
default-features = false

[dependencies.parking_lot]
version = "0.12.3"

[dependencies.raw-window-handle]
version = "0.6.2"
default-features = false

[dependencies.rustc-hash]
version = "1.1"
default-features = false

[dependencies.serde]
version = "1.0.225"
features = [
    "default",
    "derive",
]
optional = true
default-features = false

[dependencies.smallvec]
version = "1.14"

[dependencies.thiserror]
version = "2.0.12"
default-features = false

[dependencies.wgpu-hal]
version = "30.0.0"
path = "../wgpu-hal"

[dependencies.wgpu-naga-bridge]
version = "30.0.0"
path = "../wgpu-naga-bridge"

[dependencies.wgpu-types]
version = "30.0.0"
path = "../wgpu-types"
default-features = false

[build-dependencies.cfg_aliases]
version = "0.2.1"

[target.'cfg(target_os = "linux")'.dependencies.wgpu-core-deps-linux]
version = "30.0.0"
path = "../wgpu-core-deps-linux"
optional = true

[target.'cfg(not(target_has_atomic = "64"))'.dependencies.portable-atomic]
version = "1.10"
optional = true

[lints.rust]
missing_debug_implementations = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(wgpu_validate_locks)"]
