
[package]
edition = "2018"
rust-version = "1.63.0"
name = "itertools"
version = "0.14.0"
authors = ["bluss"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Extra iterator adaptors, iterator methods, free functions, and macros."
documentation = "https://docs.rs/itertools/"
keywords = [
    "iterator",
    "data-structure",
    "zip",
    "product",
]
categories = [
    "algorithms",
    "rust-patterns",
    "no-std",
    "no-std::no-alloc",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-itertools/itertools"

[features]
default = ["use_std"]
use_alloc = []
use_std = [
    "use_alloc",
    "either/use_std",
]

[lib]
name = "itertools"
path = "src/lib.rs"

[dependencies.either]
version = "1.0"
default-features = false

[profile.bench]
debug = 2
