
[package]
edition = "2021"
rust-version = "1.81"
name = "yoke"
version = "0.8.0"
authors = ["Manish Goregaokar <manishsmail@gmail.com>"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Abstraction allowing borrowed data to be carried along with the backing data it borrows from"
keywords = [
    "zerocopy",
    "serialization",
    "lifetime",
    "borrow",
    "self-referential",
]
categories = [
    "data-structures",
    "memory-management",
    "caching",
    "no-std",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.cargo-all-features]
max_combination_size = 3

[package.metadata.docs.rs]
all-features = true

[package.metadata.workspaces]
independent = true

[features]
alloc = [
    "stable_deref_trait/alloc",
    "serde?/alloc",
    "zerofrom/alloc",
]
default = [
    "alloc",
    "zerofrom",
]
derive = [
    "dep:yoke-derive",
    "zerofrom/derive",
]
serde = ["dep:serde"]
zerofrom = ["dep:zerofrom"]

[lib]
name = "yoke"
path = "src/lib.rs"

[dependencies.serde]
version = "1.0.110"
optional = true
default-features = false

[dependencies.stable_deref_trait]
version = "1.2.0"
default-features = false

[dependencies.yoke-derive]
version = "0.8.0"
optional = true
default-features = false

[dependencies.zerofrom]
version = "0.1.3"
optional = true
default-features = false
