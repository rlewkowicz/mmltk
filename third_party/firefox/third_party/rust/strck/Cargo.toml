
[package]
edition = "2021"
name = "strck"
version = "1.0.0"
authors = ["Quinn Okabayashi <quinnokabayashi@gmail.com>"]
description = "Checked owned and borrowed strings"
keywords = [
    "text",
    "ident",
    "identifier",
    "validate",
]
categories = [
    "rust-patterns",
    "memory-management",
]
license = "MIT"
repository = "https://github.com/QnnOkabayashi/strck"
resolver = "1"

[package.metadata.docs.rs]
all-features = true

[dependencies.serde]
version = "1.0"
optional = true

[dependencies.unicode-ident]
version = "1"
optional = true

[features]
ident = ["dep:unicode-ident"]
