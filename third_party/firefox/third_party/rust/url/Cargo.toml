
[package]
edition = "2018"
rust-version = "1.63"
name = "url"
version = "2.5.7"
authors = ["The rust-url developers"]
build = false
include = [
    "src/**/*",
    "LICENSE-*",
    "README.md",
    "tests/**",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "URL library for Rust, based on the WHATWG URL Standard"
documentation = "https://docs.rs/url"
keywords = [
    "url",
    "parser",
]
categories = [
    "parser-implementations",
    "web-programming",
    "encoding",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/servo/rust-url"

[package.metadata.docs.rs]
features = ["serde"]
rustdoc-args = ["--generate-link-to-definition"]

[package.metadata.playground]
features = ["serde"]

[features]
debugger_visualizer = []
default = ["std"]
expose_internals = []
std = [
    "idna/std",
    "percent-encoding/std",
    "form_urlencoded/std",
    "serde/std",
]

[lib]
name = "url"
path = "src/lib.rs"

[dependencies.form_urlencoded]
version = "1.2.2"
features = ["alloc"]
default-features = false

[dependencies.idna]
version = "1.1.0"
features = [
    "alloc",
    "compiled_data",
]
default-features = false

[dependencies.percent-encoding]
version = "2.3.2"
features = ["alloc"]
default-features = false

[dependencies.serde]
version = "1.0"
features = ["derive"]
optional = true
default-features = false
