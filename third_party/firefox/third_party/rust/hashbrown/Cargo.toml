
[package]
edition = "2024"
rust-version = "1.85.0"
name = "hashbrown"
version = "0.17.1"
build = false
exclude = [
    ".github",
    "/ci/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Rust port of Google's SwissTable hash map"
keywords = [
    "hash",
    "no_std",
    "hashmap",
    "swisstable",
]
categories = [
    "data-structures",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/hashbrown"

[package.metadata.docs.rs]
features = [
    "nightly",
    "rayon",
    "serde",
    "raw-entry",
]
rustdoc-args = ["--generate-link-to-definition"]

[features]
default = [
    "default-hasher",
    "inline-more",
    "allocator-api2",
    "equivalent",
    "raw-entry",
]
default-hasher = ["dep:foldhash"]
inline-more = []
nightly = [
    "foldhash?/nightly",
]
raw-entry = []
rustc-dep-of-std = [
    "nightly",
    "core",
    "alloc",
    "rustc-internal-api",
]
rustc-internal-api = []
serde = [
    "dep:serde_core",
    "dep:serde",
]

[lib]
name = "hashbrown"
path = "src/lib.rs"

[dependencies.alloc]
version = "1.0.0"
optional = true
package = "rustc-std-workspace-alloc"

[dependencies.allocator-api2]
version = "0.2.9"
features = ["alloc"]
optional = true
default-features = false

[dependencies.core]
version = "1.0.0"
optional = true
package = "rustc-std-workspace-core"

[dependencies.equivalent]
version = "1.0"
optional = true
default-features = false

[dependencies.foldhash]
version = "0.2.0"
optional = true
default-features = false

[dependencies.rayon]
version = "1.9.0"
optional = true

[dependencies.serde_core]
version = "1.0.221"
optional = true
default-features = false

[target."cfg(any())".dependencies.serde]
version = "1.0.220"
optional = true
default-features = false

[lints.clippy]
borrow_as_ptr = "warn"
doc_markdown = "allow"
manual_let_else = "warn"
manual_map = "allow"
missing_errors_doc = "allow"
missing_safety_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
needless_continue = "warn"
option_if_let_else = "allow"
ptr_as_ptr = "warn"
ptr_cast_constness = "warn"
redundant_else = "warn"
ref_as_ptr = "warn"
semicolon_if_nothing_returned = "warn"
str_to_string = "warn"

[lints.rust]
bare_trait_objects = "warn"
elided_lifetimes_in_paths = "warn"
ellipsis_inclusive_range_patterns = "warn"
explicit_outlives_requirements = "warn"
missing_docs = "warn"
unreachable_pub = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_extern_crates = "warn"
