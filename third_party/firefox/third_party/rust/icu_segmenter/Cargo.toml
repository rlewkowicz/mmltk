
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_segmenter"
version = "2.1.2"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Unicode line breaking and text segmentation algorithms for text boundaries analysis"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
auto = ["lstm"]
compiled_data = [
    "dep:icu_segmenter_data",
    "dep:icu_locale",
    "icu_locale?/compiled_data",
    "icu_provider/baked",
]
datagen = [
    "serde",
    "dep:databake",
    "potential_utf/databake",
    "zerovec/databake",
    "icu_collections/databake",
    "icu_provider/export",
]
default = [
    "compiled_data",
    "auto",
]
lstm = ["dep:core_maths"]
serde = [
    "dep:serde",
    "potential_utf/serde",
    "zerovec/serde",
    "icu_collections/serde",
    "icu_provider/serde",
]

[lib]
name = "icu_segmenter"
path = "src/lib.rs"

[dependencies.core_maths]
version = "0.1.0"
optional = true
default-features = false

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.icu_collections]
version = "~2.1.1"
default-features = false

[dependencies.icu_locale]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_provider]
version = "2.1.1"
default-features = false

[dependencies.icu_segmenter_data]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.potential_utf]
version = "0.1.3"
features = [
    "alloc",
    "zerovec",
]
default-features = false

[dependencies.serde]
version = "1.0.220"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false

[dependencies.utf8_iter]
version = "1.0.2"
default-features = false

[dependencies.zerovec]
version = "0.11.3"
features = [
    "alloc",
    "yoke",
]
default-features = false
