
[package]
edition = "2018"
rust-version = "1.65"
name = "hashlink"
version = "0.11.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "HashMap-like containers that hold their key-value pairs in a user controllable order"
documentation = "https://docs.rs/hashlink"
keywords = [
    "data-structures",
    "no_std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/kyren/hashlink"

[badges.circle-ci]
branch = "master"
repository = "kyren/hashlink"

[features]
serde_impl = ["serde"]

[lib]
name = "hashlink"
path = "src/lib.rs"

[dependencies.hashbrown]
version = "0.16"
features = ["default-hasher"]
default-features = false

[dependencies.serde]
version = "1.0"
optional = true
default-features = false
