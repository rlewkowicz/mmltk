
[package]
edition = "2021"
name = "uniffi_bindgen"
version = "0.31.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "a multi-language bindings generator for rust (codegen and cli tooling)"
homepage = "https://mozilla.github.io/uniffi-rs"
documentation = "https://mozilla.github.io/uniffi-rs"
keywords = [
    "ffi",
    "bindgen",
]
license = "MPL-2.0"
repository = "https://github.com/mozilla/uniffi-rs"

[package.metadata.docs.rs]
rustdoc-args = ["--generate-link-to-definition"]

[features]
cargo-metadata = ["dep:cargo_metadata"]
default = ["cargo-metadata"]

[lib]
name = "uniffi_bindgen"
path = "src/lib.rs"

[dependencies.anyhow]
version = "1"

[dependencies.askama]
version = "0.14"
features = [
    "config",
    "derive",
    "alloc",
]
default-features = false

[dependencies.camino]
version = "1.0.8"

[dependencies.cargo_metadata]
version = "0.19"
optional = true

[dependencies.fs-err]
version = "2.7.0"

[dependencies.glob]
version = "0.3"

[dependencies.goblin]
version = "0.8"

[dependencies.heck]
version = "0.5"

[dependencies.indexmap]
version = "2.2"
features = ["serde"]

[dependencies.once_cell]
version = "1.12"

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.tempfile]
version = "3"

[dependencies.textwrap]
version = "0.16"
features = ["smawk"]
default-features = false

[dependencies.toml]
version = ">=0.8, <=0.9"

[dependencies.uniffi_internal_macros]
version = "=0.31.0"

[dependencies.uniffi_meta]
version = "=0.31.0"

[dependencies.uniffi_pipeline]
version = "=0.31.0"

[dependencies.uniffi_udl]
version = "=0.31.0"
