
[package]
edition = "2021"
rust-version = "1.62.0"
name = "iana-time-zone"
version = "0.1.64"
authors = [
    "Andrew Straw <strawman@astraw.com>",
    "René Kijewski <rene.kijewski@fu-berlin.de>",
    "Ryan Lopopolo <rjl@hyperbo.la>",
]
build = false
autolib = false
autobins = false
