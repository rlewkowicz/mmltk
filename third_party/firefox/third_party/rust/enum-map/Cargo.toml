
[package]
edition = "2021"
rust-version = "1.61"
name = "enum-map"
version = "2.7.3"
authors = ["Kamila Borowska <kamila@borowska.pw>"]
description = "A map with C-like enum keys represented internally as an array"
documentation = "https://docs.rs/enum-map"
keywords = [
    "data-structure",
    "no_std",
    "enum",
]
categories = [
    "data-structures",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://codeberg.org/xfix/enum-map"

[package.metadata.docs.rs]
features = [
    "arbitrary",
    "serde",
]

[dependencies.arbitrary]
version = "1.0.0"
optional = true

[dependencies.enum-map-derive]
version = "0.17.0"

[dependencies.serde]
version = "1.0.16"
optional = true
default-features = false

[badges.maintenance]
status = "passively-maintained"
