
[package]
edition = "2021"
rust-version = "1.81"
name = "tinystr"
version = "0.8.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A small ASCII-only bounded length string representation."
keywords = [
    "string",
    "str",
    "small",
    "tiny",
    "no_std",
]
categories = ["data-structures"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[package.metadata.workspaces]
independent = true

[features]
alloc = ["zerovec?/alloc"]
databake = ["dep:databake"]
default = ["alloc"]
serde = ["dep:serde"]
std = []
zerovec = ["dep:zerovec"]

[lib]
name = "tinystr"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.serde]
version = "1.0.110"
features = ["alloc"]
optional = true
default-features = false

[dependencies.zerovec]
version = "0.11.1"
optional = true
default-features = false
