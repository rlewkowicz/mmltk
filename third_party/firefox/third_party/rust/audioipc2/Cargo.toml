
[package]
edition = "2018"
name = "audioipc2"
version = "0.6.0"
authors = [
    "Matthew Gregan <kinetik@flim.org>",
    "Dan Glastonbury <dan.glastonbury@gmail.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Remote Cubeb IPC"
license = "ISC"

[lib]
name = "audioipc2"
path = "src/lib.rs"

[dependencies]
bincode = "1.3"
byteorder = "1"
bytes = "1"
crossbeam-queue = "0.3"
cubeb = "0.34"
log = "0.4"
scopeguard = "1.1.0"
serde = "1"
serde_bytes = "0.11"
serde_derive = "1"
slab = "0.4"

[dependencies.mio]
version = "1"
features = [
    "os-poll",
    "net",
    "os-ext",
]

[target.'cfg(target_os = "linux")'.dependencies.audio_thread_priority]
version = "0.35"
default-features = false

[target."cfg(unix)".dependencies]
arrayvec = "0.7"
iovec = "0.1"
libc = "0.2"
memmap2 = "0.9"
