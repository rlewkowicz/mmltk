
[package]
edition = "2018"
rust-version = "1.53"
name = "thin-vec"
version = "0.2.16"
authors = ["Aria Beingessner <a.beingessner@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Vec that takes up less space on the stack."
homepage = "https://github.com/mozilla/thin-vec"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mozilla/thin-vec"

[features]
const_new = []
default = ["std"]
gecko-ffi = []
std = []
unstable = []

[lib]
name = "thin_vec"
path = "src/lib.rs"

[dependencies.malloc_size_of]
version = "0.1"
optional = true
default-features = false

[dependencies.serde]
version = "1.0"
optional = true

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(no_global_oom_handling)"]
