
[package]
edition = "2021"
rust-version = "1.71"
name = "tokio-util"
version = "0.7.18"
authors = ["Tokio Contributors <team@tokio.rs>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Additional utilities for working with Tokio.
"""
homepage = "https://tokio.rs"
categories = ["asynchronous"]
license = "MIT"
repository = "https://github.com/tokio-rs/tokio"

[package.metadata.docs.rs]
all-features = true
rustc-args = [
    "--cfg",
    "docsrs",
    "--cfg",
    "tokio_unstable",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
    "--cfg",
    "tokio_unstable",
]

[package.metadata.playground]
features = ["full"]

[features]
__docs_rs = ["futures-util"]
codec = []
compat = ["futures-io"]
default = []
full = [
    "codec",
    "compat",
    "io-util",
    "time",
    "net",
    "rt",
    "join-map",
]
io = []
io-util = [
    "io",
    "tokio/rt",
    "tokio/io-util",
]
join-map = [
    "rt",
    "hashbrown",
]
net = ["tokio/net"]
rt = [
    "tokio/rt",
    "tokio/sync",
    "futures-util",
]
time = [
    "tokio/time",
    "slab",
]

[lib]
name = "tokio_util"
path = "src/lib.rs"

[dependencies.bytes]
version = "1.5.0"

[dependencies.futures-core]
version = "0.3.0"

[dependencies.futures-io]
version = "0.3.0"
optional = true

[dependencies.futures-sink]
version = "0.3.0"

[dependencies.futures-util]
version = "0.3.0"
optional = true

[dependencies.hashbrown]
version = "0.15.0"
optional = true
default-features = false

[dependencies.pin-project-lite]
version = "0.2.11"

[dependencies.slab]
version = "0.4.4"
optional = true

[dependencies.tokio]
version = "1.44.0"
features = ["sync"]

[dependencies.tracing]
version = "0.1.29"
features = ["std"]
optional = true
default-features = false

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
