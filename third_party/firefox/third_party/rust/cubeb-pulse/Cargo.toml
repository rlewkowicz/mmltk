
[package]
edition = "2021"
name = "cubeb-pulse"
version = "0.5.0"
authors = ["Dan Glastonbury <dglastonbury@mozilla.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Cubeb backed for PulseAudio written in Rust"
license = "ISC"

[features]
gecko-in-tree = ["cubeb-backend/gecko-in-tree"]
pulse-dlopen = ["pulse-ffi/dlopen"]

[lib]
name = "cubeb_pulse"
crate-type = [
    "staticlib",
    "rlib",
]
path = "src/lib.rs"

[dependencies]
cubeb-backend = "0.34.1"
ringbuf = "0.2"
semver = "1.0"

[dependencies.pulse]
path = "../pulse"

[dependencies.pulse-ffi]
path = "../pulse-ffi"

[workspace]
