
[package]
edition = "2021"
rust-version = "1.87"
name = "naga"
version = "30.0.0"
authors = ["gfx-rs developers"]
build = "build.rs"
exclude = [
    "bin/**/*",
    "tests/**/*",
    "Cargo.lock",
    "target/**/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Shader translator and validator. Part of the wgpu project"
keywords = [
    "shader",
    "SPIR-V",
    "GLSL",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gfx-rs/wgpu"

[package.metadata.docs.rs]
all-features = true

[features]
arbitrary = [
    "dep:arbitrary",
    "bitflags/arbitrary",
    "half/arbitrary",
    "half/std",
    "naga-types/arbitrary",
]
default = []
deserialize = [
    "dep:serde",
    "bitflags/serde",
    "half/serde",
    "hashbrown/serde",
    "naga-types/deserialize",
]
dot-out = []
fs = []
glsl-in = ["dep:pp-rs"]
glsl-out = []
serialize = [
    "dep:serde",
    "bitflags/serde",
    "half/serde",
    "hashbrown/serde",
    "naga-types/serialize",
]
spv-in = [
    "dep:petgraph",
    "petgraph/graphmap",
    "dep:spirv",
]
spv-out = ["dep:spirv"]
stderr = ["codespan-reporting/std"]
termcolor = ["codespan-reporting/termcolor"]
wgsl-in = ["dep:unicode-ident"]
wgsl-out = []

[lib]
name = "naga"
path = "src/lib.rs"

[dependencies.arbitrary]
version = "1.4.2"
features = ["derive"]
optional = true

[dependencies.arrayvec]
version = "0.7.1"
default-features = false

[dependencies.bit-set]
version = "0.10"
default-features = false

[dependencies.bitflags]
version = "2.9"

[dependencies.cfg-if]
version = "1"

[dependencies.codespan-reporting]
version = "0.13"
default-features = false

[dependencies.half]
version = "2.5"
features = ["num-traits"]
default-features = false

[dependencies.hashbrown]
version = "0.17"
features = [
    "default-hasher",
    "inline-more",
]
default-features = false

[dependencies.indexmap]
version = "2.11.4"
default-features = false

[dependencies.libm]
version = "0.2.6"
default-features = false

[dependencies.log]
version = "0.4.29"

[dependencies.naga-types]
version = "30.0.0"
path = "../naga-types"

[dependencies.num-traits]
version = "0.2.16"
default-features = false

[dependencies.once_cell]
version = "1.21"
features = [
    "alloc",
    "race",
]
default-features = false

[dependencies.petgraph]
version = "0.8"
optional = true
default-features = false

[dependencies.pp-rs]
version = "0.2.1"
optional = true

[dependencies.rustc-hash]
version = "1.1"
default-features = false

[dependencies.serde]
version = "1.0.225"
features = [
    "alloc",
    "derive",
]
optional = true
default-features = false

[dependencies.spirv]
version = "0.4"
optional = true

[dependencies.thiserror]
version = "2.0.12"
default-features = false

[dependencies.unicode-ident]
version = "1.0.5"
optional = true

[build-dependencies.cfg_aliases]
version = "0.2.1"

[lints.clippy]
alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"

[lints.rust]
missing_debug_implementations = "warn"
