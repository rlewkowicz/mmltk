
[package]
edition = "2021"
rust-version = "1.63"
name = "indexmap"
version = "2.11.4"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A hash table with consistent order and fast iteration."
documentation = "https://docs.rs/indexmap/"
keywords = [
    "hashmap",
    "no_std",
]
categories = [
    "data-structures",
    "no-std",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/indexmap-rs/indexmap"

[package.metadata.release]
allow-branch = ["main"]
sign-tag = true
tag-name = "{{version}}"

[package.metadata.docs.rs]
features = [
    "arbitrary",
    "quickcheck",
    "serde",
    "borsh",
    "rayon",
    "sval",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
default = ["std"]
serde = [
    "dep:serde_core",
    "dep:serde",
]
std = []
test_debug = []

[lib]
name = "indexmap"
path = "src/lib.rs"

[dependencies.arbitrary]
version = "1.0"
optional = true
default-features = false

[dependencies.borsh]
version = "1.2"
optional = true
default-features = false

[dependencies.equivalent]
version = "1.0"
default-features = false

[dependencies.hashbrown]
version = ">= 0.15.0, < 0.17.0"
default-features = false

[dependencies.quickcheck]
version = "1.0"
optional = true
default-features = false

[dependencies.rayon]
version = "1.9"
optional = true

[dependencies.serde_core]
version = "1.0.220"
optional = true
default-features = false

[dependencies.sval]
version = "2"
optional = true
default-features = false

[target."cfg(any())".dependencies.serde]
version = "1.0.220"
optional = true
default-features = false

[lints.clippy]
style = "allow"

[profile.bench]
debug = 2
