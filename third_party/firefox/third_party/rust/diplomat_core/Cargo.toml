
[package]
edition = "2021"
rust-version = "1.81"
name = "diplomat_core"
version = "0.14.0"
authors = [
    "Shadaj Laddad <shadaj@users.noreply.github.com>",
    "Manish Goregaokar <manishsmail@gmail.com>",
    "Quinn Okabayashi <QnnOkabayashi@users.noreply.github.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Shared utilities between Diplomat macros and code generation"
keywords = [
    "ffi",
    "codegen",
]
categories = [
    "development-tools",
    "compilers",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-diplomat/diplomat"

[package.metadata.docs.rs]
all-features = true

[features]
hir = ["either"]

[lib]
name = "diplomat_core"
path = "src/lib.rs"

[dependencies.displaydoc]
version = "0.2"
optional = true

[dependencies.either]
version = "1.9.0"
optional = true
default-features = false

[dependencies.proc-macro2]
version = "1.0.27"

[dependencies.quote]
version = "1.0"

[dependencies.serde]
version = "1.0"
features = [
    "derive",
    "alloc",
]
default-features = false

[dependencies.smallvec]
version = "1.9.0"

[dependencies.strck]
version = "1.0"
features = ["ident"]

[dependencies.syn]
version = "2"
features = [
    "full",
    "extra-traits",
]
