
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_collections"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Collection of API for use in ICU libraries."
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
alloc = [
    "serde?/alloc",
    "zerovec/alloc",
]
databake = [
    "dep:databake",
    "zerovec/databake",
]
serde = [
    "dep:serde",
    "zerovec/serde",
    "potential_utf/serde",
    "alloc",
]

[lib]
name = "icu_collections"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.potential_utf]
version = "0.1.3"
features = ["zerovec"]
default-features = false

[dependencies.serde]
version = "1.0.220"
features = ["derive"]
optional = true
default-features = false

[dependencies.yoke]
version = "0.8.0"
features = ["derive"]
default-features = false

[dependencies.zerofrom]
version = "0.1.3"
features = ["derive"]
default-features = false

[dependencies.zerovec]
version = "0.11.3"
features = [
    "derive",
    "yoke",
]
default-features = false
