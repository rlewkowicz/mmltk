
[package]
edition = "2018"
rust-version = "1.63"
name = "allocator-api2"
version = "0.2.21"
authors = ["Zakarum <zaq.dev@icloud.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Mirror of Rust's allocator API"
homepage = "https://github.com/zakarumych/allocator-api2"
documentation = "https://docs.rs/allocator-api2"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zakarumych/allocator-api2"

[features]
alloc = []
default = ["std"]
fresh-rust = []
nightly = []
std = ["alloc"]

[lib]
name = "allocator_api2"
path = "src/lib.rs"

[dependencies.serde]
version = "1.0"
optional = true

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(no_global_oom_handling)"]

[workspace]
members = ["tests"]
