
[package]
edition = "2021"
rust-version = "1.70"
name = "serde_with_macros"
version = "3.12.0"
authors = ["Jonas Bushart"]
build = false
include = [
    "src/**/*",
    "tests/**/*",
    "!tests/compile-fail/**",
    "LICENSE-*",
    "README.md",
    "CHANGELOG.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "proc-macro library for serde_with"
documentation = "https://docs.rs/serde_with_macros/"
keywords = [
    "serde",
    "utilities",
    "serialization",
    "deserialization",
]
categories = ["encoding"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/jonasbb/serde_with/"

[package.metadata.docs.rs]
all-features = true

[package.metadata.release]
tag = false

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
replace = """
[Unreleased]

## [{{version}}] - {{date}}"""
search = '\[Unreleased\]'

[[package.metadata.release.pre-release-replacements]]
file = "src/lib.rs"
replace = "https://docs.rs/serde_with/{{version}}/"
search = 'https://docs\.rs/serde_with/[\d.]+/'

[[package.metadata.release.pre-release-replacements]]
file = "src/lib.rs"
replace = "https://docs.rs/serde_with_macros/{{version}}/"
search = 'https://docs\.rs/serde_with_macros/[\d.]+/'

[lib]
name = "serde_with_macros"
path = "src/lib.rs"
proc-macro = true

[dependencies.darling]
version = "0.20.0"

[dependencies.proc-macro2]
version = "1.0.1"

[dependencies.quote]
version = "1.0.0"

[dependencies.syn]
version = "2.0.0"
features = [
    "extra-traits",
    "full",
    "parsing",
]

[features]
schemars_0_8 = []

[badges.maintenance]
status = "actively-developed"

[lints.clippy]
cloned_instead_of_copied = "warn"
default_trait_access = "warn"
doc_markdown = "warn"
explicit_auto_deref = "allow"
manual-unwrap-or-default = "allow"
redundant_closure_for_method_calls = "warn"
semicolon_if_nothing_returned = "warn"

[lints.rust]
missing_docs = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
variant_size_differences = "warn"

[lints.rust.rust_2018_idioms]
level = "warn"
priority = -1

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(tarpaulin)",
    "cfg(tarpaulin_include)",
]

[lints.rustdoc]
missing_crate_level_docs = "warn"
