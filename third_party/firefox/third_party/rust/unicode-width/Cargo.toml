
[package]
edition = "2021"
name = "unicode-width"
version = "0.2.0"
authors = [
    "kwantam <kwantam@gmail.com>",
    "Manish Goregaokar <manishsmail@gmail.com>",
]
build = false
exclude = ["/.github/*"]
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Determine displayed width of `char` and `str` types
according to Unicode Standard Annex #11 rules.
"""
homepage = "https://github.com/unicode-rs/unicode-width"
keywords = [
    "text",
    "width",
    "unicode",
]
categories = [
    "command-line-interface",
    "internationalization",
    "no-std::no-alloc",
    "text-processing",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/unicode-rs/unicode-width"

[lib]
name = "unicode_width"
path = "src/lib.rs"

[dependencies.compiler_builtins]
version = "0.1"
optional = true

[dependencies.core]
version = "1.0"
optional = true
package = "rustc-std-workspace-core"

[dependencies.std]
version = "1.0"
optional = true
package = "rustc-std-workspace-std"

[features]
cjk = []
default = ["cjk"]
no_std = []
rustc-dep-of-std = [
    "std",
    "core",
    "compiler_builtins",
]
