
[package]
edition = "2021"
rust-version = "1.66"
name = "phf_codegen"
version = "0.13.1"
authors = ["Steven Fackler <sfackler@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Codegen library for PHF types"
categories = ["data-structures"]
license = "MIT"
repository = "https://github.com/rust-phf/rust-phf"
resolver = "1"

[lib]
name = "phf_codegen"
path = "src/lib.rs"

[dependencies.phf_generator]
version = "0.13.1"

[dependencies.phf_shared]
version = "0.13.1"
