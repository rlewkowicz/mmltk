
[package]
edition = "2021"
name = "memtest"
version = "0.4.0"
authors = ["Brian Tsoi <brian.s.tsoi@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A library for detecting faulty memory"
homepage = "https://github.com/mozilla/memtest"
keywords = [
    "memory",
    "stability",
]
license = "MPL-2.0"
repository = "https://github.com/mozilla/memtest"

[lib]
name = "memtest"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.69"
num_cpus = "1.16.0"
serde_json = "1.0.116"
tracing = "0.1.37"

[dependencies.rand]
version = "0.8.5"
features = ["small_rng"]

[dependencies.serde]
version = "1.0.214"
features = ["derive"]

[target."cfg(unix)".dependencies]
libc = "0.2.158"
