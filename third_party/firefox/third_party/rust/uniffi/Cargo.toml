
[package]
edition = "2021"
name = "uniffi"
version = "0.31.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "a multi-language bindings generator for rust"
homepage = "https://mozilla.github.io/uniffi-rs"
documentation = "https://mozilla.github.io/uniffi-rs"
keywords = [
    "ffi",
    "bindgen",
]
license = "MPL-2.0"
repository = "https://github.com/mozilla/uniffi-rs"

[package.metadata.docs.rs]
rustdoc-args = ["--generate-link-to-definition"]

[features]
bindgen = ["dep:uniffi_bindgen"]
build = ["dep:uniffi_build"]
cargo-metadata = [
    "dep:cargo_metadata",
    "uniffi_bindgen?/cargo-metadata",
]
cli = [
    "bindgen",
    "dep:clap",
    "dep:camino",
]
default = ["cargo-metadata"]
ffi-trace = [
    "uniffi_core/ffi-trace",
    "uniffi_bindgen?/ffi-trace",
]
scaffolding-ffi-buffer-fns = [
    "uniffi_core/scaffolding-ffi-buffer-fns",
    "uniffi_macros/scaffolding-ffi-buffer-fns",
]
tokio = ["uniffi_core/tokio"]
wasm-unstable-single-threaded = [
    "uniffi_core/wasm-unstable-single-threaded",
    "uniffi_macros/wasm-unstable-single-threaded",
]

[lib]
name = "uniffi"
path = "src/lib.rs"

[[bin]]
name = "uniffi-bindgen"
path = "uniffi-bindgen.rs"
doc = false
required-features = ["cli"]

[[bin]]
name = "uniffi-bindgen-swift"
path = "uniffi-bindgen-swift.rs"
doc = false
required-features = ["cli"]

[dependencies.anyhow]
version = "1"

[dependencies.camino]
version = "1.0.8"
optional = true

[dependencies.cargo_metadata]
version = "0.19"
optional = true

[dependencies.clap]
version = "4"
features = [
    "cargo",
    "derive",
    "error-context",
    "help",
    "suggestions",
    "std",
    "usage",
]
optional = true
default-features = false

[dependencies.uniffi_bindgen]
version = "=0.31.0"
optional = true
default-features = false

[dependencies.uniffi_build]
version = "=0.31.0"
optional = true

[dependencies.uniffi_core]
version = "=0.31.0"

[dependencies.uniffi_macros]
version = "=0.31.0"

[dependencies.uniffi_pipeline]
version = "=0.31.0"
