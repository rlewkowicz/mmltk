
[package]
edition = "2018"
rust-version = "1.63.0"
name = "tracing"
version = "0.1.41"
authors = [
    "Eliza Weisman <eliza@buoyant.io>",
    "Tokio Contributors <team@tokio.rs>",
]
build = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Application-level tracing for Rust.
"""
homepage = "https://tokio.rs"
keywords = [
    "logging",
    "tracing",
    "metrics",
    "async",
]
categories = [
    "development-tools::debugging",
    "development-tools::profiling",
    "asynchronous",
    "no-std",
]
license = "MIT"
repository = "https://github.com/tokio-rs/tracing"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustc-args = [
    "--cfg",
    "tracing_unstable",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
    "--cfg",
    "tracing_unstable",
]

[lib]
name = "tracing"
path = "src/lib.rs"

[dependencies.log]
version = "0.4.17"
optional = true

[dependencies.pin-project-lite]
version = "0.2.9"

[dependencies.tracing-attributes]
version = "0.1.28"
optional = true

[dependencies.tracing-core]
version = "0.1.33"
default-features = false

[features]
async-await = []
attributes = ["tracing-attributes"]
default = [
    "std",
    "attributes",
]
log-always = ["log"]
max_level_debug = []
max_level_error = []
max_level_info = []
max_level_off = []
max_level_trace = []
max_level_warn = []
release_max_level_debug = []
release_max_level_error = []
release_max_level_info = []
release_max_level_off = []
release_max_level_trace = []
release_max_level_warn = []
std = ["tracing-core/std"]
valuable = ["tracing-core/valuable"]

[badges.maintenance]
status = "actively-developed"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(flaky_tests)",
    "cfg(tracing_unstable)",
]
