
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_locale_core"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "API for managing Unicode Language and Locale Identifiers"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
alloc = [
    "litemap/alloc",
    "tinystr/alloc",
    "writeable/alloc",
    "serde?/alloc",
]
databake = [
    "dep:databake",
    "alloc",
]
serde = [
    "dep:serde",
    "tinystr/serde",
]
zerovec = [
    "dep:zerovec",
    "tinystr/zerovec",
]

[lib]
name = "icu_locale_core"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.litemap]
version = "0.8.0"
default-features = false

[dependencies.serde]
version = "1.0.220"
optional = true
default-features = false

[dependencies.tinystr]
version = "0.8.0"
default-features = false

[dependencies.writeable]
version = "0.6.0"
default-features = false

[dependencies.zerovec]
version = "0.11.3"
optional = true
default-features = false
