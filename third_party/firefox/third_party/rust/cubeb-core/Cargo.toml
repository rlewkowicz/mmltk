
[package]
name = "cubeb-core"
version = "0.34.1"
authors = ["Dan Glastonbury <dglastonbury@mozilla.com>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Common types and definitions for cubeb rust and C bindings. Not intended for direct use.
"""
homepage = "https://github.com/mozilla/cubeb-rs"
keywords = ["cubeb"]
categories = ["api-bindings"]
license = "ISC"
repository = "https://github.com/mozilla/cubeb-rs"
resolver = "2"

[badges.circle-ci]
repository = "mozilla/cubeb-rs"

[features]
gecko-in-tree = ["cubeb-sys/gecko-in-tree"]

[lib]
name = "cubeb_core"
path = "src/lib.rs"

[dependencies.bitflags]
version = "1.2.0"

[dependencies.cubeb-sys]
version = "0.34"

[build-dependencies.cc]
version = "1.1.30"
