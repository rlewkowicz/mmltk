
[package]
edition = "2018"
rust-version = "1.60"
name = "similar"
version = "2.7.0"
authors = [
    "Armin Ronacher <armin.ronacher@active-4.com>",
    "Pierre-Étienne Meunier <pe@pijul.org>",
    "Brandon Williams <bwilliams.eng@gmail.com>",
]
build = false
exclude = ["assets/*"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A diff library for Rust"
keywords = [
    "diff",
    "difference",
    "patience",
    "compare",
    "changes",
]
license = "Apache-2.0"
repository = "https://github.com/mitsuhiko/similar"

[package.metadata.docs.rs]
all-features = true

[profile.release]
debug = 2

[lib]
name = "similar"
path = "src/lib.rs"

[dependencies.bstr]
version = "1.5.0"
optional = true
default-features = false

[dependencies.serde]
version = "1.0.130"
features = ["derive"]
optional = true

[dependencies.unicode-segmentation]
version = "1.7.1"
optional = true

[dependencies.web-time]
version = "1.1"
optional = true

[features]
bytes = [
    "bstr",
    "text",
]
default = ["text"]
inline = ["text"]
text = []
unicode = [
    "text",
    "unicode-segmentation",
    "bstr?/unicode",
    "bstr?/std",
]
wasm32_web_time = ["web-time"]
