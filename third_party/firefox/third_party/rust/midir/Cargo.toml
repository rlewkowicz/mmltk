
[package]
edition = "2021"
name = "midir"
version = "0.10.3"
authors = ["Patrick Reisert"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A cross-platform, realtime MIDI processing library, inspired by RtMidi."
keywords = [
    "midi",
    "audio",
    "music",
    "sound",
]
categories = [
    "multimedia::audio",
    "api-bindings",
]
license = "MIT"
repository = "https://github.com/Boddlnagg/midir"

[features]
avoid_timestamping = []
default = []
jack = [
    "jack-sys",
    "libc",
    "bitflags",
]

[lib]
name = "midir"
path = "src/lib.rs"

[dependencies.bitflags]
version = "2"
optional = true

[dependencies.jack-sys]
version = "0.5"
optional = true

[dependencies.libc]
version = "0.2.21"
optional = true

[target.'cfg(target_os = "linux")'.dependencies]
alsa = "0.9.0"
libc = "0.2.21"
