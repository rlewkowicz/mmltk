
[package]
edition = "2021"
rust-version = "1.82"
name = "bit-vec"
version = "0.9.1"
authors = ["Alexis Beingessner <a.beingessner@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A vector of bits"
homepage = "https://github.com/contain-rs/bit-vec"
documentation = "https://docs.rs/bit-vec/"
keywords = [
    "data-structures",
    "bitvec",
    "bitmask",
    "bitmap",
    "bit",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/contain-rs/bit-vec"

[package.metadata.docs.rs]
features = [
    "borsh",
    "serde",
    "miniserde",
    "nanoserde",
]

[features]
borsh_std = ["borsh/std"]
default = ["std"]
serde_no_std = []
serde_std = [
    "std",
    "serde/std",
]
std = ["serde?/std"]

[lib]
name = "bit_vec"
path = "src/lib.rs"

[dependencies.borsh]
version = "1.6.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.miniserde]
version = "0.1"
optional = true

[dependencies.nanoserde]
version = "0.2"
optional = true

[dependencies.serde]
version = "1.0"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false
