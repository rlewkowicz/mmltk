
[package]
edition = "2021"
rust-version = "1.71"
name = "tokio-macros"
version = "2.7.0"
authors = ["Tokio Contributors <team@tokio.rs>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Tokio's proc macros.
"""
homepage = "https://tokio.rs"
categories = ["asynchronous"]
license = "MIT"
repository = "https://github.com/tokio-rs/tokio"

[package.metadata.docs.rs]
all-features = true

[features]

[lib]
name = "tokio_macros"
path = "src/lib.rs"
proc-macro = true

[dependencies.proc-macro2]
version = "1.0.60"

[dependencies.quote]
version = "1"

[dependencies.syn]
version = "2.0"
features = ["full"]

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
