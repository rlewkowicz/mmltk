
[package]
edition = "2021"
name = "mls-platform-api"
version = "0.2.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
license = "Apache-2.0 OR MIT"

[features]
gecko = ["mls-rs-crypto-nss/gecko"]

[lib]
name = "mls_platform_api"
path = "src/lib.rs"

[dependencies]
bincode = "1.3"
serde_json = "1.0"
sha2 = "0.10"
thiserror = "2"

[dependencies.hex]
version = "0.4"
features = ["serde"]

[dependencies.mls-rs]
version = "0.54"
features = [
    "std",
    "serde",
    "rfc_compliant",
]
default-features = false

[dependencies.mls-rs-crypto-nss]
path = "../mls-rs-crypto-nss"

[dependencies.mls-rs-provider-sqlite]
path = "../mls-rs-provider-sqlite"
features = ["sqlcipher-bundled"]

[dependencies.serde]
version = "1.0"
features = [
    "alloc",
    "derive",
    "rc",
]
