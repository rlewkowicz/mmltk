
[package]
edition = "2021"
rust-version = "1.88.0"
name = "plist"
version = "1.10.0"
authors = ["Ed Barnard <eabarnard@gmail.com>"]
build = false
exclude = ["/tests/data"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A rusty plist parser. Supports Serde serialization."
documentation = "https://docs.rs/plist/"
keywords = [
    "plist",
    "parser",
]
categories = [
    "config",
    "encoding",
    "parser-implementations",
]
license = "MIT"
repository = "https://github.com/ebarnard/rust-plist/"

[features]
default = ["serde"]
enable_unstable_features_that_may_break_with_minor_version_bumps = []

[lib]
name = "plist"
path = "src/lib.rs"

[dependencies.base64]
version = "0.22.0"

[dependencies.indexmap]
version = "2.1.0"

[dependencies.quick_xml]
version = "0.41.0"
package = "quick-xml"

[dependencies.serde]
version = "1.0.2"
optional = true

[dependencies.time]
version = "0.3.47"
features = [
    "parsing",
    "formatting",
]
