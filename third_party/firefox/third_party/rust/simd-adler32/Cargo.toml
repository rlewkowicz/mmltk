
[package]
edition = "2018"
name = "simd-adler32"
version = "0.3.7"
authors = ["Marvin Countryman <me@maar.vin>"]
exclude = ["bench"]
description = "A SIMD-accelerated Adler-32 hash algorithm implementation."
keywords = [
    "simd",
    "avx2",
    "ssse3",
    "adler",
    "adler32",
]
categories = [
    "algorithms",
    "no-std",
]
license = "MIT"
repository = "https://github.com/mcountryman/simd-adler32"

[profile.release]
opt-level = 2
debug = 2

[features]
const-generics = []
default = [
    "std",
    "const-generics",
]
nightly = []
std = []
