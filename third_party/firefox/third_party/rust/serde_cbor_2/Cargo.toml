
[package]
edition = "2021"
rust-version = "1.81"
name = "serde_cbor_2"
version = "0.13.0"
authors = [
    "William Brown <william@blackhats.net.au>",
    "James Hodgkinson <james@terminaloutcomes.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "CBOR support for Serde."
keywords = [
    "serde",
    "cbor",
    "serialization",
    "no_std",
]
categories = ["encoding"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/kanidm/cbor"

[badges.maintenance]
status = "passively-maintained"

[features]
alloc = ["serde/alloc"]
default = ["std"]
std = ["serde/std"]
tags = []
unsealed_read_write = []

[lib]
name = "serde_cbor_2"
path = "src/lib.rs"

[dependencies.half]
version = "2"
default-features = false

[dependencies.serde]
version = "1"
default-features = false
