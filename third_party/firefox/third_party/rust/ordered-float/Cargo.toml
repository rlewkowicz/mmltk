
[package]
edition = "2018"
name = "ordered-float"
version = "3.4.0"
authors = [
    "Jonathan Reem <jonathan.reem@gmail.com>",
    "Matt Brubeck <mbrubeck@limpet.net>",
]
description = "Wrappers for total ordering on floats"
keywords = [
    "no_std",
    "ord",
    "f64",
    "f32",
    "sort",
]
categories = [
    "science",
    "rust-patterns",
    "no-std",
]
license = "MIT"
repository = "https://github.com/reem/rust-ordered-float"

[dependencies.arbitrary]
version = "1.0.0"
optional = true

[dependencies.bytemuck]
version = "1.12.2"
optional = true
default-features = false

[dependencies.num-traits]
version = "0.2.1"
default-features = false

[dependencies.proptest]
version = "1.0.0"
optional = true

[dependencies.rand]
version = "0.8.3"
optional = true
default-features = false

[dependencies.rkyv]
version = "0.7"
features = ["size_32"]
optional = true
default-features = false

[dependencies.schemars]
version = "0.8.8"
optional = true

[dependencies.serde]
version = "1.0"
optional = true
default-features = false

[dependencies.speedy]
version = "0.8.3"
optional = true
default-features = false

[features]
default = ["std"]
randtest = [
    "rand/std",
    "rand/std_rng",
]
std = ["num-traits/std"]
