
[package]
edition = "2021"
rust-version = "1.66"
name = "phf_macros"
version = "0.13.1"
authors = ["Steven Fackler <sfackler@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Macros to generate types in the phf crate"
categories = ["data-structures"]
license = "MIT"
repository = "https://github.com/rust-phf/rust-phf"
resolver = "1"

[features]
uncased = [
    "uncased_",
    "phf_shared/uncased",
]
unicase = [
    "unicase_",
    "phf_shared/unicase",
]

[lib]
name = "phf_macros"
path = "src/lib.rs"
proc-macro = true

[dependencies.phf_generator]
version = "0.13.1"

[dependencies.phf_shared]
version = "^0.13.1"
default-features = false

[dependencies.proc-macro2]
version = "1.0.95"

[dependencies.quote]
version = "1"

[dependencies.syn]
version = "2"
features = ["full"]

[dependencies.uncased_]
version = "0.9.7"
optional = true
package = "uncased"

[dependencies.unicase_]
version = "2.4.0"
optional = true
package = "unicase"
