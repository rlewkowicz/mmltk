
[package]
edition = "2018"
name = "macro_rules_attribute"
version = "0.2.2"
authors = ["Daniel Henry-Mantilla <daniel.henry.mantilla@gmail.com>"]
exclude = ["*.sh"]
description = "Use declarative macros in attribute or derive position"
homepage = "https://crates.io/crates/macro_rules_attribute"
documentation = "https://docs.rs/macro_rules_attribute"
keywords = [
    "macro",
    "attribute",
    "decorator",
    "derive",
    "macro_rules",
]
categories = ["rust-patterns"]
license = "Apache-2.0 OR MIT OR Zlib"
repository = "https://github.com/danielhenrymantilla/macro_rules_attribute-rs"

[package.metadata.docs.rs]
features = ["better-docs"]
rustdoc-args = [
    "--html-before-content",
    "fix-docsrs-li-details-summary.html",
]

[dependencies.macro_rules_attribute-proc_macro]
version = "=0.2.2"

[dependencies.paste]
version = "1.0.7"

[features]
better-docs = []
default = []
verbose-expansions = ["macro_rules_attribute-proc_macro/verbose-expansions"]
