
[package]
edition = "2021"
name = "uniffi_meta"
version = "0.31.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "uniffi_meta"
homepage = "https://mozilla.github.io/uniffi-rs"
keywords = [
    "ffi",
    "bindgen",
]
license = "MPL-2.0"
repository = "https://github.com/mozilla/uniffi-rs"

[package.metadata.docs.rs]
rustdoc-args = ["--generate-link-to-definition"]

[lib]
name = "uniffi_meta"
path = "src/lib.rs"

[dependencies.anyhow]
version = "1"

[dependencies.siphasher]
version = "1"

[dependencies.uniffi_internal_macros]
version = "0.31.0"

[dependencies.uniffi_pipeline]
version = "0.31.0"
