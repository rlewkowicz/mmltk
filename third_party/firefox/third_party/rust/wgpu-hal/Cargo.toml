
[package]
edition = "2021"
rust-version = "1.87"
name = "wgpu-hal"
version = "30.0.0"
authors = ["gfx-rs developers"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Hardware abstraction layer for wgpu, the cross-platform, safe, pure-rust graphics API"
homepage = "https://wgpu.rs/"
keywords = ["graphics"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gfx-rs/wgpu"

[package.metadata.docs.rs]
features = [
    "vulkan",
    "renderdoc",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[package.metadata.cargo-machete]
ignored = ["cfg_aliases"]

[features]
device_lost_panic = []
internal_error_panic = []
portable-atomic = [
    "dep:portable-atomic",
    "dep:portable-atomic-util",
]
renderdoc = [
    "dep:libloading",
    "dep:renderdoc-sys",
]
validation_canary = ["dep:parking_lot"]
vulkan = [
    "naga/spv-out",
    "dep:arrayvec",
    "dep:ash",
    "dep:bytemuck",
    "dep:libc",
    "dep:libloading",
    "dep:ordered-float",
    "dep:parking_lot",
    "dep:smallvec",
    "gpu-allocator/vulkan",
]

[lib]
name = "wgpu_hal"
path = "src/lib.rs"

[dependencies.arrayvec]
version = "0.7.1"
optional = true
default-features = false

[dependencies.bitflags]
version = "2.9"

[dependencies.bytemuck]
version = "1.22"
features = [
    "extern_crate_alloc",
    "min_const_generics",
    "derive",
]
optional = true

[dependencies.cfg-if]
version = "1"

[dependencies.hashbrown]
version = "0.17"
features = [
    "default-hasher",
    "inline-more",
]
default-features = false

[dependencies.log]
version = "0.4.29"

[dependencies.naga]
version = "30.0.0"
path = "../naga"

[dependencies.naga-types]
version = "30.0.0"
path = "../naga-types"

[dependencies.ordered-float]
version = ">=3, <6.0"
optional = true
default-features = false

[dependencies.parking_lot]
version = "0.12.3"
optional = true

[dependencies.raw-window-handle]
version = "0.6.2"
default-features = false

[dependencies.static_assertions]
version = "1.1"

[dependencies.thiserror]
version = "2.0.12"
default-features = false

[dependencies.wgpu-naga-bridge]
version = "30.0.0"
path = "../wgpu-naga-bridge"

[dependencies.wgpu-types]
version = "30.0.0"
path = "../wgpu-types"
default-features = false

[build-dependencies.cfg_aliases]
version = "0.2.1"

[target.'cfg(target_os = "linux")'.dependencies.ash]
version = "0.38"
optional = true

[target.'cfg(target_os = "linux")'.dependencies.gpu-allocator]
version = "0.28"
features = ["hashbrown"]
optional = true
default-features = false

[target.'cfg(target_os = "linux")'.dependencies.libloading]
version = "0.8"
optional = true

[target.'cfg(target_os = "linux")'.dependencies.renderdoc-sys]
version = "1"
optional = true

[target.'cfg(target_os = "linux")'.dependencies.smallvec]
version = "1.14"
features = ["union"]
optional = true

[target.'cfg(any(not(target_has_atomic = "64"), not(target_has_atomic = "ptr")))'.dependencies.portable-atomic]
version = "1.10"
optional = true

[target.'cfg(not(target_has_atomic = "ptr"))'.dependencies.portable-atomic-util]
version = "0.2.4"
features = ["alloc"]
optional = true

[target."cfg(unix)".dependencies.libc]
version = "0.2.183"
optional = true
default-features = false

[lints.rust]
missing_debug_implementations = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    'cfg(feature, values("cargo-clippy"))',
    "cfg(web_sys_unstable_apis)",
]
