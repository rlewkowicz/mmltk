
[package]
edition = "2021"
name = "wpf-gpu-raster"
version = "0.1.0"
build = false
include = [
    "src/**/*",
    "LICENSE",
    "README.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
license = "MIT"

[features]
c_bindings = []
default = ["c_bindings"]

[lib]
name = "wpf_gpu_raster"
path = "src/lib.rs"

[dependencies]
typed-arena-nomut = "0.1.0"

[profile.release]
debug = 2
