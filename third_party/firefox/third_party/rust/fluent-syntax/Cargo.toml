
[package]
edition = "2021"
rust-version = "1.64.0"
name = "fluent-syntax"
version = "0.12.0"
authors = [
    "Caleb Maclennan <caleb@alerque.com>",
    "Bruce Mitchener <bruce.mitchener@gmail.com",
    "Zibi Braniecki <zibi@unicode.org>",
    "Staś Małolepszy <stas@mozilla.com>",
]
build = false
include = [
    "src/**/*",
    "benches/*.rs",
    "Cargo.toml",
    "README.md",
    "LICENSE-APACHE",
    "LICENSE-MIT",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
A low-level parser, AST, and serializer API for the syntax used by Project Fluent,
a localization system designed to unleash the entire expressive power of natural language translations.
"""
homepage = "https://www.projectfluent.org"
keywords = [
    "localization",
    "l10n",
    "i18n",
    "intl",
    "internationalization",
]
categories = [
    "localization",
    "internationalization",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/projectfluent/fluent-rs"

[features]
all-benchmarks = []
default = []
json = [
    "serde",
    "dep:serde_json",
]
serde = ["dep:serde"]

[lib]
name = "fluent_syntax"
path = "src/lib.rs"

[[bin]]
name = "parser"
path = "src/bin/parser.rs"

[[bin]]
name = "update_fixtures"
path = "src/bin/update_fixtures.rs"
required-features = ["json"]

[dependencies.memchr]
version = "2.0"

[dependencies.serde]
version = "1.0"
features = ["derive"]
optional = true

[dependencies.serde_json]
version = "1.0"
optional = true

[dependencies.thiserror]
version = "2.0"
