
[package]
name = "cose"
version = "0.1.4"
authors = [
    "Franziskus Kiefer <franziskuskiefer@gmail.com>",
    "David Keeler <dkeeler@mozilla.com>",
]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Library to use COSE (https://tools.ietf.org/html/rfc8152) in Rust"
keywords = [
    "cose",
    "jose",
]
license = "MPL-2.0"
repository = "https://github.com/franziskuskiefer/cose-rust"

[features]
default = []

[lib]
name = "cose"
path = "src/cose.rs"

[dependencies]
moz_cbor = "0.1.0"
