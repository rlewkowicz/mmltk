
[package]
edition = "2018"
rust-version = "1.56"
name = "headers"
version = "0.4.1"
authors = ["Sean McArthur <sean@seanmonstar.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "typed HTTP headers"
homepage = "https://hyper.rs"
keywords = [
    "http",
    "headers",
    "hyper",
    "hyperium",
]
categories = ["web-programming"]
license = "MIT"
repository = "https://github.com/hyperium/headers"

[features]
nightly = []

[lib]
name = "headers"
path = "src/lib.rs"

[dependencies.base64]
version = "0.22"

[dependencies.bytes]
version = "1"

[dependencies.headers-core]
version = "0.3"

[dependencies.http]
version = "1.0.0"

[dependencies.httpdate]
version = "1"

[dependencies.mime]
version = "0.3.14"

[dependencies.sha1]
version = "0.10"
