
[package]
edition = "2021"
name = "error-graph"
version = "0.1.1"
authors = ["Chris Martin <marti4d@live.ca>"]
build = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Allows non-fatal errors in a tree of subfunctions to easily be collected by a caller"
keywords = [
    "error",
    "error-handling",
]
categories = ["rust-patterns"]
license = "MIT"
repository = "https://github.com/marti4d/error-graph"

[lib]
name = "error_graph"
path = "src/lib.rs"

[dependencies.serde]
version = "1"
optional = true

[features]
serde = ["dep:serde"]
