
[package]
edition = "2021"
rust-version = "1.67"
name = "zerofrom"
version = "0.1.4"
authors = ["Manish Goregaokar <manishsmail@gmail.com>"]
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
]
description = "ZeroFrom trait for constructing"
keywords = [
    "zerocopy",
    "serialization",
    "lifetime",
    "borrow",
]
categories = [
    "data-structures",
    "caching",
    "no-std",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[package.metadata.workspaces]
independent = true

[dependencies.zerofrom-derive]
version = "0.1.3"
optional = true
default-features = false

[features]
alloc = []
default = ["alloc"]
derive = ["dep:zerofrom-derive"]
