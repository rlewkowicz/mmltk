
[package]
edition = "2021"
rust-version = "1.82"
name = "litemap"
version = "0.8.0"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A key-value Map implementation based on a flat, sorted Vec."
documentation = "https://docs.rs/litemap"
keywords = [
    "sorted",
    "vec",
    "map",
    "hashmap",
    "btreemap",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[package.metadata.workspaces]
independent = true

[features]
alloc = []
databake = ["dep:databake"]
default = ["alloc"]
serde = [
    "dep:serde",
    "alloc",
]
testing = ["alloc"]
yoke = ["dep:yoke"]

[lib]
name = "litemap"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
optional = true
default-features = false

[dependencies.serde]
version = "1.0.110"
features = ["alloc"]
optional = true
default-features = false

[dependencies.yoke]
version = "0.8.0"
features = ["derive"]
optional = true
default-features = false
