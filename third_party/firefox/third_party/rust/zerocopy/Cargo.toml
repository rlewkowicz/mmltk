
[package]
edition = "2021"
rust-version = "1.56.0"
name = "zerocopy"
version = "0.8.27"
authors = [
    "Joshua Liebow-Feeser <joshlf@google.com>",
    "Jack Wrenn <jswrenn@amazon.com>",
]
build = "build.rs"
exclude = [".*"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """Zerocopy makes zero-cost memory manipulation effortless. We write "unsafe" so you don't have to."""
keywords = [
    "cast",
    "convert",
    "transmute",
    "transmutation",
    "type-punning",
]
categories = [
    "embedded",
    "encoding",
    "no-std::no-alloc",
    "parsing",
    "rust-patterns",
]
license = "BSD-2-Clause OR Apache-2.0 OR MIT"
repository = "https://github.com/google/zerocopy"

[package.metadata.build-rs]
zerocopy-core-error-1-81-0 = "1.81.0"
zerocopy-diagnostic-on-unimplemented-1-78-0 = "1.78.0"
zerocopy-generic-bounds-in-const-fn-1-61-0 = "1.61.0"
zerocopy-target-has-atomics-1-60-0 = "1.60.0"
zerocopy-aarch64-simd-1-59-0 = "1.59.0"
zerocopy-panic-in-const-and-vec-try-reserve-1-57-0 = "1.57.0"

[package.metadata.ci]
pinned-stable = "1.89.0"
pinned-nightly = "nightly-2025-09-05"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "doc_cfg",
    "--generate-link-to-definition",
]

[package.metadata.playground]
features = ["__internal_use_only_features_that_work_on_stable"]

[features]
__internal_use_only_features_that_work_on_stable = [
    "alloc",
    "derive",
    "simd",
    "std",
]
alloc = []
derive = ["zerocopy-derive"]
float-nightly = []
simd = []
simd-nightly = ["simd"]
std = ["alloc"]

[lib]
name = "zerocopy"
path = "src/lib.rs"

[dependencies.zerocopy-derive]
version = "=0.8.27"
optional = true

[target."cfg(any())".dependencies.zerocopy-derive]
version = "=0.8.27"
