
[package]
edition = "2024"
name = "jxl_macros"
version = "0.4.3"
authors = ["Luca Versari <veluca93@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "High performance Rust implementation of a JPEG XL decoder - supporting macros"
keywords = [
    "jpeg-xl",
    "decoder",
]
categories = ["multimedia::images"]
license = "BSD-3-Clause"
repository = "https://github.com/libjxl/jxl-rs"

[features]

[lib]
name = "jxl_macros"
path = "src/lib.rs"
proc-macro = true

[dependencies]
proc-macro-error2 = "2.0.1"
proc-macro2 = "1.0"
quote = "1.0"

[dependencies.syn]
version = "2.0.90"
features = [
    "extra-traits",
    "full",
]

[lints.clippy]
missing_safety_doc = "deny"
undocumented_unsafe_blocks = "deny"

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
