
[package]
edition = "2021"
name = "libcrux-p256"
version = "0.0.3"
authors = ["Cryspen"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Formally verified P-256 implementation"
homepage = "https://github.com/cryspen/libcrux"
license = "Apache-2.0"
repository = "https://github.com/cryspen/libcrux"

[features]
expose-hacl = []

[lib]
name = "libcrux_p256"
path = "src/lib.rs"

[dependencies.libcrux-hacl-rs]
version = "=0.0.3"

[dependencies.libcrux-macros]
version = "=0.0.3"

[dependencies.libcrux-sha2]
version = "=0.0.3"
features = ["expose-hacl"]
