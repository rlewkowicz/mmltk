
[package]
edition = "2021"
rust-version = "1.63.0"
name = "euclid"
version = "0.22.13"
authors = ["The Servo Project Developers"]
description = "Geometry primitives"
documentation = "https://docs.rs/euclid/"
keywords = [
    "matrix",
    "vector",
    "linear-algebra",
    "geometry",
]
categories = ["science"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/servo/euclid"
resolver = "2"

[dependencies.arbitrary]
version = "1"
optional = true

[dependencies.bytemuck]
version = "1.9"
optional = true

[dependencies.malloc_size_of]
version = "0.1"
optional = true
default-features = false

[dependencies.mint]
version = "0.5.1"
optional = true

[dependencies.num-traits]
version = "0.2.15"
default-features = false

[dependencies.serde]
version = "1.0"
features = ["serde_derive"]
optional = true
default-features = false

[features]
default = ["std"]
libm = ["num-traits/libm"]
std = ["num-traits/std"]
unstable = []
