
[package]
edition = "2018"
name = "etagere"
version = "0.2.13"
authors = ["Nicolas Silva <nical@fastmail.com>"]
exclude = [".backup*"]
description = "Dynamic 2D texture atlas allocation using the shelf packing algorithm."
documentation = "https://docs.rs/etagere/"
keywords = ["2d"]
license = "MIT/Apache-2.0"
repository = "https://github.com/nical/etagere"

[profile.release]
debug = 2

[dependencies.euclid]
version = "0.22"

[dependencies.serde]
version = "1.0"
optional = true

[dependencies.svg_fmt]
version = "0.4"

[features]
checks = []
ffi = []
serialization = [
    "serde",
    "euclid/serde",
]
