
[package]
edition = "2018"
rust-version = "1.82"
name = "rkv"
version = "0.20.0"
authors = [
    "Richard Newman <rnewman@twinql.com>",
    "Nan Jiang <najiang@mozilla.com>",
    "Myk Melez <myk@mykzilla.org>",
    "Victor Porof <vporof@mozilla.com>",
]
build = false
exclude = ["/tests/envs/*"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A simple, humane, typed key-value storage solution"
homepage = "https://github.com/mozilla/rkv"
documentation = "https://docs.rs/rkv"
keywords = [
    "database",
    "storage",
]
categories = ["database"]
license = "Apache-2.0"
repository = "https://github.com/mozilla/rkv"

[features]
db-dup-sort = []
db-int-key = []
default = [
    "db-dup-sort",
    "db-int-key",
]
malloc-size-of = [
    "dep:malloc_size_of",
    "dep:malloc_size_of_derive",
]
no-canonicalize-path = []

[lib]
name = "rkv"
path = "src/lib.rs"

[dependencies.arrayref]
version = "0.3"

[dependencies.bincode]
version = "1.0"

[dependencies.bitflags]
version = "2.4.1"
features = ["serde"]

[dependencies.id-arena]
version = "2.2"

[dependencies.lazy_static]
version = "1.1"

[dependencies.log]
version = "0.4.20"

[dependencies.malloc_size_of]
version = "0.2.2"
optional = true
default-features = false
package = "wr_malloc_size_of"

[dependencies.malloc_size_of_derive]
version = "0.1.3"
optional = true

[dependencies.ordered-float]
version = "3.0.0"

[dependencies.serde]
version = "1.0.144"
features = [
    "derive",
    "rc",
]

[dependencies.serde_derive]
version = "1.0"

[dependencies.thiserror]
version = "2.0"

[dependencies.url]
version = "2.0"

[dependencies.uuid]
version = "1.0"
