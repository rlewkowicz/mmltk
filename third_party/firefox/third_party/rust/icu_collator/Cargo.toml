
[package]
edition = "2021"
rust-version = "1.82"
name = "icu_collator"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "API for comparing strings according to language-dependent conventions"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[features]
compiled_data = [
    "dep:icu_collator_data",
    "icu_normalizer/compiled_data",
    "dep:icu_locale",
    "icu_locale?/compiled_data",
    "icu_provider/baked",
]
datagen = [
    "serde",
    "dep:databake",
    "zerovec/databake",
    "icu_properties/datagen",
    "icu_normalizer/datagen",
    "icu_collections/databake",
    "icu_provider/export",
]
default = ["compiled_data"]
serde = [
    "dep:serde",
    "zerovec/serde",
    "icu_properties/serde",
    "icu_normalizer/serde",
    "icu_collections/serde",
    "icu_provider/serde",
]
latin1 = []
unstable = ["dep:tinystr"]

[lib]
name = "icu_collator"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.icu_collator_data]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_collections]
version = "~2.1.1"
default-features = false

[dependencies.icu_locale]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_locale_core]
version = "2.1.1"
features = ["alloc"]
default-features = false

[dependencies.icu_normalizer]
version = "~2.1.1"
default-features = false

[dependencies.icu_properties]
version = "~2.1.1"
default-features = false

[dependencies.icu_provider]
version = "2.1.1"
default-features = false

[dependencies.serde]
version = "1.0.110"
features = [
    "derive",
    "alloc",
]
optional = true
default-features = false

[dependencies.smallvec]
version = "1.10.0"
features = [
    "union",
    "const_generics",
    "const_new",
]
default-features = false

[dependencies.tinystr]
version = "0.8.0"
optional = true
default-features = false

[dependencies.utf16_iter]
version = "1.0.2"
default-features = false
features = ["icu_collections"]

[dependencies.utf8_iter]
version = "1.0.2"
default-features = false
features = ["icu_collections"]

[dependencies.zerovec]
version = "0.11.1"
default-features = false
