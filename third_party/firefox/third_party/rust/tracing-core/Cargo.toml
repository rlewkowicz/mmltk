
[package]
edition = "2018"
rust-version = "1.63.0"
name = "tracing-core"
version = "0.1.33"
authors = ["Tokio Contributors <team@tokio.rs>"]
build = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Core primitives for application-level tracing.
"""
homepage = "https://tokio.rs"
keywords = [
    "logging",
    "tracing",
    "profiling",
]
categories = [
    "development-tools::debugging",
    "development-tools::profiling",
    "asynchronous",
]
license = "MIT"
repository = "https://github.com/tokio-rs/tracing"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustc-args = [
    "--cfg",
    "tracing_unstable",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
    "--cfg",
    "tracing_unstable",
]

[lib]
name = "tracing_core"
path = "src/lib.rs"

[dependencies.once_cell]
version = "1.13.0"
optional = true

[features]
default = [
    "std",
    "valuable?/std",
]
std = ["once_cell"]

[target."cfg(tracing_unstable)".dependencies.valuable]
version = "0.1.0"
optional = true
default-features = false

[badges.maintenance]
status = "actively-developed"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(flaky_tests)",
    "cfg(tracing_unstable)",
]
