
[package]
edition = "2021"
rust-version = "1.66"
name = "phf_generator"
version = "0.13.1"
authors = ["Steven Fackler <sfackler@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "PHF generation logic"
categories = ["data-structures"]
license = "MIT"
repository = "https://github.com/rust-phf/rust-phf"
resolver = "1"

[lib]
name = "phf_generator"
path = "src/lib.rs"

[[bin]]
name = "gen_hash_test"
path = "src/bin/gen_hash_test.rs"

[dependencies.fastrand]
version = "2.1.0"
default-features = false

[dependencies.phf_shared]
version = "^0.13.1"
default-features = false
