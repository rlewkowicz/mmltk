
[package]
edition = "2018"
name = "jexl-parser"
version = "0.4.0"
authors = [
    "Mike Cooper <mythmon@gmail.com>",
    "The Sync Team <sync-team@mozilla.com>",
    "The Glean Team <glean-team@mozilla.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A JEXL parser written in Rust"
license = "MPL-2.0"
repository = "https://github.com/mozilla/jexl-rs"

[lib]
name = "jexl_parser"
path = "src/lib.rs"

[dependencies.lalrpop-util]
version = "0.19"
features = ["lexer"]

[dependencies.regex]
version = "1.3"
