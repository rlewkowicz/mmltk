
[package]
edition = "2021"
name = "clubcard"
version = "0.3.3"
authors = ["John M. Schanck <jschanck@mozilla.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Clubcard is an exact membership query filter for static sets"
license = "MPL-2.0"
repository = "https://github.com/mozilla/clubcard/"

[features]
builder = ["dep:rand"]

[lib]
name = "clubcard"
path = "src/lib.rs"

[dependencies.rand]
version = "0.8.5"
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]
