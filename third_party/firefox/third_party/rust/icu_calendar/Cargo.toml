
[package]
edition = "2021"
rust-version = "1.83"
name = "icu_calendar"
version = "2.1.1"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Date APIs for Gregorian and non-Gregorian calendars"
homepage = "https://icu4x.unicode.org"
categories = ["internationalization"]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-semver-checks.lints]
workspace = true

[features]
alloc = [
    "icu_locale_core/alloc",
    "tinystr/alloc",
    "serde?/alloc",
]
compiled_data = [
    "dep:icu_calendar_data",
    "dep:icu_locale",
    "icu_locale?/compiled_data",
    "icu_provider/baked",
]
datagen = [
    "serde",
    "dep:databake",
    "zerovec/databake",
    "tinystr/databake",
    "alloc",
    "icu_provider/export",
]
default = [
    "compiled_data",
    "ixdtf",
]
ixdtf = ["dep:ixdtf"]
logging = ["calendrical_calculations/logging"]
serde = [
    "dep:serde",
    "zerovec/serde",
    "tinystr/serde",
    "icu_provider/serde",
]
unstable = []

[lib]
name = "icu_calendar"
path = "src/lib.rs"

[dependencies.calendrical_calculations]
version = "0.2.3"
default-features = false

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.displaydoc]
version = "0.2.3"
default-features = false

[dependencies.icu_calendar_data]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_locale]
version = "~2.1.1"
optional = true
default-features = false

[dependencies.icu_locale_core]
version = "2.1.1"
default-features = false

[dependencies.icu_provider]
version = "2.1.1"
default-features = false

[dependencies.ixdtf]
version = "0.6.0"
optional = true
default-features = false

[dependencies.serde]
version = "1.0.220"
features = ["derive"]
optional = true
default-features = false

[dependencies.tinystr]
version = "0.8.0"
features = ["zerovec"]
default-features = false

[dependencies.zerovec]
version = "0.11.3"
features = ["derive"]
default-features = false
