
[package]
edition = "2021"
name = "framehop"
version = "0.15.0"
authors = ["Markus Stange <mstange.moz@gmail.com>"]
build = false
exclude = [
    "/.github",
    "/.vscode",
    "/tests",
    "/fixtures",
    "/big-fixtures",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Stack frame unwinding support for various formats"
documentation = "https://docs.rs/framehop/"
keywords = [
    "unwind",
    "stackwalk",
    "profiling",
    "debug",
]
categories = ["development-tools::debugging"]
license = "MIT/Apache-2.0"
repository = "https://github.com/mstange/framehop/"

[features]
default = [
    "std",
    "macho",
    "pe",
]
macho = ["macho-unwind-info"]
pe = ["pe-unwind-info"]
std = [
    "arrayvec/std",
    "gimli/std",
]

[lib]
name = "framehop"
path = "src/lib.rs"

[dependencies.arrayvec]
version = "0.7.4"
default-features = false

[dependencies.cfg-if]
version = "1.0.0"

[dependencies.fallible-iterator]
version = "0.3.0"

[dependencies.gimli]
version = "0.32"
features = ["read"]
default-features = false

[dependencies.macho-unwind-info]
version = "0.5.0"
optional = true

[dependencies.pe-unwind-info]
version = "0.6"
optional = true

[profile.release]
debug = 2
