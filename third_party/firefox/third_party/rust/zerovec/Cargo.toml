
[package]
edition = "2021"
rust-version = "1.82"
name = "zerovec"
version = "0.11.4"
authors = ["The ICU4X Project Developers"]
build = false
include = [
    "data/**/*",
    "src/**/*",
    "examples/**/*",
    "benches/**/*",
    "tests/**/*",
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "build.rs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Zero-copy vector backed by a byte array"
keywords = [
    "zerocopy",
    "serialization",
    "zero-copy",
    "serde",
]
categories = [
    "rust-patterns",
    "memory-management",
    "caching",
    "no-std",
    "data-structures",
]
license = "Unicode-3.0"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.cargo-all-features]
max_combination_size = 3

[package.metadata.docs.rs]
all-features = true

[package.metadata.workspaces]
independent = true

[features]
alloc = []
databake = ["dep:databake"]
derive = ["dep:zerovec-derive"]
hashmap = [
    "dep:twox-hash",
    "alloc",
]
serde = [
    "dep:serde",
    "alloc",
]
std = []
yoke = ["dep:yoke"]

[lib]
name = "zerovec"
path = "src/lib.rs"

[dependencies.databake]
version = "0.2.0"
features = ["derive"]
optional = true
default-features = false

[dependencies.serde]
version = "1.0.110"
features = [
    "alloc",
    "derive",
]
optional = true
default-features = false

[dependencies.twox-hash]
version = "2.0.0"
features = ["xxhash64"]
optional = true
default-features = false

[dependencies.yoke]
version = "0.8.0"
optional = true
default-features = false

[dependencies.zerofrom]
version = "0.1.3"
default-features = false

[dependencies.zerovec-derive]
version = "0.11.1"
optional = true
default-features = false
