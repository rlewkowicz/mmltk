
[package]
edition = "2018"
rust-version = "1.61"
name = "http-body-util"
version = "0.1.3"
authors = [
    "Carl Lerche <me@carllerche.com>",
    "Lucio Franco <luciofranco14@gmail.com>",
    "Sean McArthur <sean@seanmonstar.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Combinators and adapters for HTTP request or response bodies.
"""
documentation = "https://docs.rs/http-body-util"
keywords = ["http"]
categories = ["web-programming"]
license = "MIT"
repository = "https://github.com/hyperium/http-body"

[features]
channel = ["dep:tokio"]
default = []
full = ["channel"]

[lib]
name = "http_body_util"
path = "src/lib.rs"

[dependencies.bytes]
version = "1"

[dependencies.futures-core]
version = "0.3"
default-features = false

[dependencies.http]
version = "1"

[dependencies.http-body]
version = "1"

[dependencies.pin-project-lite]
version = "0.2"

[dependencies.tokio]
version = "1"
features = ["sync"]
optional = true
