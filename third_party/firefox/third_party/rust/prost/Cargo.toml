
[package]
edition = "2021"
rust-version = "1.71.1"
name = "prost"
version = "0.13.5"
authors = [
    "Dan Burkert <dan@danburkert.com>",
    "Lucio Franco <luciofranco14@gmail.com>",
    "Casper Meijn <casper@meijn.net>",
    "Tokio Contributors <team@tokio.rs>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Protocol Buffers implementation for the Rust Language."
keywords = [
    "protobuf",
    "serialization",
]
categories = ["encoding"]
license = "Apache-2.0"
repository = "https://github.com/tokio-rs/prost"

[features]
default = [
    "derive",
    "std",
]
derive = ["dep:prost-derive"]
no-recursion-limit = []
prost-derive = ["derive"]
std = []

[lib]
name = "prost"
path = "src/lib.rs"

[dependencies.bytes]
version = "1"
default-features = false

[dependencies.prost-derive]
version = "0.13.5"
optional = true
