
[package]
edition = "2018"
name = "lalrpop-util"
version = "0.19.12"
authors = ["Niko Matsakis <niko@alum.mit.edu>"]
description = "Runtime library for parsers generated by LALRPOP"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/lalrpop/lalrpop"

[package.metadata.docs.rs]
features = ["lexer"]

[dependencies.regex]
version = "1"
optional = true

[features]
default = ["std"]
lexer = [
    "regex/std",
    "std",
]
std = []
