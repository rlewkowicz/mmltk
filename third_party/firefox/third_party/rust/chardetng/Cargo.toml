
[package]
edition = "2018"
rust-version = "1.40"
name = "chardetng"
version = "1.0.0"
authors = ["Henri Sivonen <hsivonen@hsivonen.fi>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A character encoding detector for legacy Web content"
homepage = "https://docs.rs/chardetng/"
documentation = "https://docs.rs/chardetng/"
keywords = [
    "encoding",
    "web",
    "unicode",
    "charset",
]
categories = [
    "text-processing",
    "encoding",
    "web-programming",
    "internationalization",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/hsivonen/chardetng"

[badges.maintenance]
status = "passively-maintained"

[features]
multithreading = [
    "rayon",
    "arrayvec",
]
testing-only-no-semver-guarantees-do-not-use = []

[lib]
name = "chardetng"
path = "src/lib.rs"

[dependencies.arrayvec]
version = "0.7.6"
optional = true

[dependencies.cfg-if]
version = "1.0"

[dependencies.encoding_rs]
version = "0.8.29"
default-features = false

[dependencies.memchr]
version = "2.2.0"
default-features = false

[dependencies.rayon]
version = "1.3.0"
optional = true
