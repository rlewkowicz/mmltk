
[package]
edition = "2024"
name = "urlpattern"
version = "0.6.0"
authors = [
    "the Deno authors",
    "crowlKats <crowlkats@toaxl.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "rust-urlpattern is a Rust implementation of the URLPattern standard"
license = "MIT"
repository = "https://github.com/denoland/rust-urlpattern"

[lib]
name = "urlpattern"
path = "src/lib.rs"

[dependencies.icu_properties]
version = "2"

[dependencies.regex]
version = "1.10.5"

[dependencies.serde]
version = "1.0.127"
features = ["derive"]

[dependencies.url]
version = "2.5.6"
