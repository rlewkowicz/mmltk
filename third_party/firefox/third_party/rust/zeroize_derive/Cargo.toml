
[package]
edition = "2021"
rust-version = "1.56"
name = "zeroize_derive"
version = "1.4.2"
authors = ["The RustCrypto Project Developers"]
description = "Custom derive support for zeroize"
keywords = [
    "memory",
    "memset",
    "secure",
    "volatile",
    "zero",
]
categories = [
    "cryptography",
    "memory-management",
    "no-std",
    "os",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/RustCrypto/utils/tree/master/zeroize/derive"
resolver = "1"

[package.metadata.docs.rs]
rustdoc-args = ["--document-private-items"]

[lib]
proc-macro = true

[dependencies.proc-macro2]
version = "1"

[dependencies.quote]
version = "1"

[dependencies.syn]
version = "2"
features = [
    "full",
    "extra-traits",
    "visit",
]
