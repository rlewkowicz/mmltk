
[package]
edition = "2021"
name = "jxl_transforms"
version = "0.4.3"
authors = ["Luca Versari <veluca93@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "High performance Rust implementation of a JPEG XL decoder - Transforms"
keywords = [
    "jpeg-xl",
    "simd",
    "dct",
]
categories = ["multimedia::images"]
license = "BSD-3-Clause"
repository = "https://github.com/libjxl/jxl-rs"

[features]
all-simd = ["jxl_simd/all-simd"]
avx = ["jxl_simd/avx"]
avx512 = ["jxl_simd/avx512"]
neon = ["jxl_simd/neon"]
sse42 = ["jxl_simd/sse42"]

[lib]
name = "jxl_transforms"
path = "src/lib.rs"

[dependencies.jxl_simd]
version = "=0.4.3"
path = "../jxl_simd"

[lints.clippy]
missing_safety_doc = "deny"
undocumented_unsafe_blocks = "deny"

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
