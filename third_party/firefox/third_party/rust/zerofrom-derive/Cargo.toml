
[package]
edition = "2021"
name = "zerofrom-derive"
version = "0.1.3"
authors = ["Manish Goregaokar <manishsmail@gmail.com>"]
description = "Custom derive for the zerofrom crate"
keywords = [
    "zerocopy",
    "serialization",
    "lifetime",
    "borrow",
]
categories = [
    "data-structures",
    "memory-management",
    "caching",
    "no-std",
]
license-file = "LICENSE"
repository = "https://github.com/unicode-org/icu4x"

[package.metadata.workspaces]
independent = true

[lib]
path = "src/lib.rs"
proc_macro = true

[dependencies.proc-macro2]
version = "1.0.27"

[dependencies.quote]
version = "1.0.9"

[dependencies.syn]
version = "2"
features = [
    "derive",
    "fold",
    "visit",
]

[dependencies.synstructure]
version = "0.13"
