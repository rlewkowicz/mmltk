<!doctype html>

<html xmlns="http://www.w3.org/1999/xhtml" class="private">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src chrome:; img-src chrome: blob:; object-src 'none';"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="chrome://browser/skin/privatebrowsing/favicon.svg" />
    <link
      rel="stylesheet"
      href="chrome://browser/content/aboutPrivateBrowsing.css"
      media="all"
    />
    <link
      rel="stylesheet"
      href="chrome://browser/skin/privatebrowsing/aboutPrivateBrowsing.css"
      media="all"
    />
    <link rel="localization" href="branding/brand.ftl" />
    <link rel="localization" href="toolkit/branding/brandings.ftl" />
    <link rel="localization" href="browser/aboutPrivateBrowsing.ftl" />
    <script src="chrome://browser/content/aboutPrivateBrowsing.js"></script>
    <script
      type="module"
      src="chrome://browser/content/contentSearchHandoffUI.mjs"
    ></script>
  </head>

  <body>
    <p class="showNormal" data-l10n-id="about-private-browsing-not-private"></p>
    <button
      id="startPrivateBrowsing"
      class="showNormal"
      data-l10n-id="privatebrowsingpage-open-private-window-label"
    ></button>
    <div class="showPrivate showSearch container">
      <div class="logo-and-wordmark">
        <div id="about-private-browsing-logo" class="logo"></div>
        <div class="wordmark"></div>
      </div>
      <p
        class="nova-tagline"
        data-l10n-id="about-private-browsing-nova-info-header"
      ></p>
      <p
        class="nova-subheader"
        data-l10n-id="about-private-browsing-nova-info-subheader"
      ></p>
      <div class="search-inner-wrapper">
        <content-search-handoff-ui></content-search-handoff-ui>
      </div>
      <div class="info-border">
        <div class="info">
          <h1
            id="info-title"
            data-l10n-id="about-private-browsing-felt-privacy-v1-info-header"
          ></h1>
          <p
            id="info-body"
            data-l10n-id="about-private-browsing-felt-privacy-v1-info-body"
          ></p>
          <a
            id="private-browsing-myths"
            data-l10n-id="about-private-browsing-felt-privacy-v1-info-link"
            target="_blank"
          ></a>
        </div>
      </div>
    </div>
  </body>
</html>
