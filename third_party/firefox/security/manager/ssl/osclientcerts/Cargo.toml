[package]
name = "osclientcerts"
version = "0.1.4"
authors = ["Dana Keeler <dkeeler@mozilla.com>"]
edition = "2018"
description = "Platform-specific support for client authentication certificates in Firefox"
license = "MPL-2.0"

[dependencies]
byteorder = "1.3"
cstr = "0.2"
env_logger = {version = "0.10", default-features = false } 
futures-executor = { version = "0.3" }
lazy_static = "1"
log = "0.4"
nserror = { path = "../../../../xpcom/rust/nserror" }
moz_task = { path = "../../../../xpcom/rust/moz_task" }
pkcs11-bindings = "0.1"
rsclientcerts = { path = "../rsclientcerts" }
rsclientcerts-util = { path = "../rsclientcerts-util" }
xpcom = { path = "../../../../xpcom/rust/xpcom" }
