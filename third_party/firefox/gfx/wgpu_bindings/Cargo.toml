[package]
name = "wgpu_bindings"
version = "0.1.0"
authors = [
  "Dzmitry Malyshau <kvark@mozilla.com>",
  "Joshua Groves <josh@joshgroves.com>",
]
edition = "2021"
license = "MPL-2.0"
publish = false

[lib]

[features]
default = []

[dependencies.wgc]
package = "wgpu-core"
git = "https://github.com/gfx-rs/wgpu"
rev = "93e00976015c937fc86f02bd9efcf343c6ce5e5d"
features = ["serde", "strict_asserts", "wgsl", "api_log_info"]

[target.'cfg(target_os = "linux")'.dependencies.wgc]
package = "wgpu-core"
git = "https://github.com/gfx-rs/wgpu"
rev = "93e00976015c937fc86f02bd9efcf343c6ce5e5d"
features = ["vulkan"]

[dependencies.wgt]
package = "wgpu-types"
git = "https://github.com/gfx-rs/wgpu"
rev = "93e00976015c937fc86f02bd9efcf343c6ce5e5d"

[dependencies.wgh]
package = "wgpu-hal"
git = "https://github.com/gfx-rs/wgpu"
rev = "93e00976015c937fc86f02bd9efcf343c6ce5e5d"

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dependencies]
bincode = "1"
log = "0.4"
parking_lot = "0.12"
serde = "1"
serde_json = "1"
nsstring = { path = "../../xpcom/rust/nsstring" }
static_prefs = { path = "../../modules/libpref/init/static_prefs" }
arrayvec = "0.7"
ash = "0.38"
moz_task = { path = "../../xpcom/rust/moz_task" }
futures-channel = "0.3"
