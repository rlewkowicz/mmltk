[workspace]
members = [
    "examples",
    "webrender",
    "webrender_api",
    "wrench",
]
resolver = "2"

[workspace.dependencies]
gleam = "0.15.1"

[profile.release]
debug = true
panic = "abort"

[profile.dev]
panic = "abort"

[profile.dev.package.glsl]
opt-level = 2

[profile.release.package.glsl]
opt-level = 2

[patch.crates-io]
wr_malloc_size_of = { path = "wr_malloc_size_of" }
