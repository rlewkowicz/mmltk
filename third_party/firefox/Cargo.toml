[workspace]

members = [
  "toolkit/library/rust/",
]

exclude = [
  "servo",
  "third_party/rust",

  "gfx/wr",

  "gfx/webrender_bindings",
  "xpcom/rust/gkrust_utils",
  "dom/base/rust",
  "dom/origin-trials/ffi",
  "ipc/rust/ipdl_utils",
  "tools/update-verify/marannon",

]

resolver = "2"

[workspace.package]
rust-version = "1.90.0"

[workspace.dependencies]
uniffi = "0.31"
uniffi_bindgen = "0.31"
uniffi_pipeline = "0.31"
rusqlite = "0.37"
[profile.dev]
opt-level = 1
rpath = false
lto = false
debug-assertions = true
panic = "abort"

[profile.release]
opt-level = 3
rpath = false
debug-assertions = false
panic = "abort"

[profile.dev.build-override]
opt-level = 1

[profile.release.build-override]
opt-level = 1

[profile.dev-megazord]
inherits = "dev"
panic = "unwind"

[profile.release-megazord]
inherits = "release"
panic = "unwind"

[patch.crates-io]
mozbuild = { path = "build/rust/mozbuild" }

mozilla-central-workspace-hack = { path = "build/workspace-hack" }

bitflags = { path = "build/rust/bitflags" }

base64_21 = { package = "base64", path = "build/rust/base64" }

itertools = { path = "build/rust/itertools" }

bindgen_0_72 = { package = "bindgen", git = "https://github.com/glandium/rust-bindgen", rev = "5274da5a06411accb266c10819b989ac25a81b7d" }

bindgen = { path = "build/rust/bindgen" }

icu_collator = { path = "third_party/rust/icu_collator" }
icu_collator_data = { path = "third_party/rust/icu_collator_data" }
icu_normalizer = { path = "third_party/rust/icu_normalizer" }
icu_normalizer_data = { path = "third_party/rust/icu_normalizer_data" }
icu_collections = { path = "third_party/rust/icu_collections" }
utf8_iter = { path = "third_party/rust/utf8_iter" }
utf16_iter = { path = "third_party/rust/utf16_iter" }
icu_properties = { path = "third_party/rust/icu_properties" }
icu_properties_data = { path = "third_party/rust/icu_properties_data" }

autocfg = { path = "third_party/rust/autocfg" }

goblin = { path = "build/rust/goblin" }

getrandom = { path = "build/rust/getrandom" }

rustc-hash = { path = "build/rust/rustc-hash" }

hashbrown_0_13 = { package = "hashbrown", path = "build/rust/hashbrown-0.13" }

hashbrown_0_14 = { package = "hashbrown", path = "build/rust/hashbrown-0.14" }

hashbrown_0_15 = { package = "hashbrown", path = "build/rust/hashbrown-0.15" }

hashbrown_0_16 = { package = "hashbrown", path = "build/rust/hashbrown" }

hashlink = { path = "build/rust/hashlink" }

thiserror = { path = "build/rust/thiserror" }

toml = { path = "build/rust/toml" }

moz_asserts = { path = "mozglue/static/rust/moz_asserts" }

rure = { path = "third_party/rust/rure" }

unicode-bidi = { git = "https://github.com/servo/unicode-bidi", rev = "ca612daf1c08c53abe07327cb3e6ef6e0a760f0c" }

any_all_workaround = { git = "https://github.com/hsivonen/any_all_workaround", rev = "7fb1b7034c9f172aade21ee1c8554e8d8a48af80" }
icu_capi = { path = "intl/icu_capi" }
icu_segmenter_data = { path = "intl/icu_segmenter_data" }
malloc_size_of_derive = { path = "xpcom/rust/malloc_size_of_derive" }
wr_malloc_size_of = { path = "gfx/wr/wr_malloc_size_of" }
harfbuzz-sys = { git = "https://github.com/hsivonen/rust-harfbuzz", rev = "9d58a23a98772a197291d04af93f7041b7093d95" }
harfbuzz = { git = "https://github.com/hsivonen/rust-harfbuzz", rev = "9d58a23a98772a197291d04af93f7041b7093d95" }
harfbuzz-traits = { git = "https://github.com/hsivonen/rust-harfbuzz", rev = "9d58a23a98772a197291d04af93f7041b7093d95" }
encoding_rs = { git = "https://github.com/hsivonen/encoding_rs", rev = "1236d1bc423e6ba35a06485f74a6304db2d703b5" }

allocator-api2 = { git = "https://github.com/glandium/allocator-api2", rev = "ad5f3d56a5a4519eff52af4ff85293431466ef5c" }

error-support = { path = "third_party/application-services/components/support/error" }
tracing-support = { path = "third_party/application-services/components/support/tracing" }
ohttp = { git = "https://github.com/martinthomson/ohttp", rev = "600931b5a1e947776cbaad931ed78f1e89005352" }

[patch."https://github.com/libjxl/jxl-rs"]
jxl_simd = { path = "third_party/rust/jxl_simd" }
